<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>定向地图图例库 - ISOM 2017-2 / ISSprOM 2019-2</title>
<style>
/* ===== Reset & Base ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#f0f5f3;color:#1a1a2e;min-height:100vh;transition:background .3s,color .3s}

/* ===== Dark Mode ===== */
@media (prefers-color-scheme:dark){
  body{background:#0d1117;color:#e6edf3}
  .header{background:rgba(22,27,34,.85)!important;border-color:rgba(240,246,240,.08)!important}
  .header h1{color:#e6edf3!important}
  .header .subtitle{color:#8b949e!important}
  .search-input{background:rgba(255,255,255,.06)!important;border-color:rgba(240,246,240,.12)!important;color:#e6edf3!important}
  .search-input::placeholder{color:#6e7681!important}
  .tab-bar{background:rgba(22,27,34,.7)!important;border-color:rgba(240,246,240,.08)!important}
  .tab{color:#8b949e!important}
  .tab:hover{background:rgba(45,106,79,.15)!important;color:#3fb950!important}
  .tab.active{background:rgba(45,106,79,.25)!important;color:#3fb950!important;border-color:#3fb950!important}
  .card{background:rgba(22,27,34,.7)!important;border-color:rgba(240,246,240,.06)!important}
  .card:hover{background:rgba(22,27,34,.9)!important;border-color:rgba(45,106,79,.3)!important}
  .card .code{color:#6e7681!important}
  .card .name{color:#e6edf3!important}
  .card .desc{color:#8b949e!important}
  .img-wrap{background:rgba(255,255,255,.04)!important;border-color:rgba(240,246,240,.06)!important}
  .group-header{color:#8b949e!important}
  .detail-nav{background:rgba(22,27,34,.85)!important;border-color:rgba(240,246,240,.08)!important}
  .detail-nav .back-btn{color:#e6edf3!important}
  .detail-nav .nav-count{color:#8b949e!important}
  .detail-nav .nav-arrow{color:#e6edf3!important}
  .detail-code{color:#3fb950!important}
  .detail-name{color:#e6edf3!important}
  .detail-img-wrap{background:rgba(255,255,255,.04)!important;border-color:rgba(240,246,240,.06)!important}
  .desc-card{background:rgba(22,27,34,.7)!important;border-color:rgba(240,246,240,.06)!important}
  .desc-card p{color:#c9d1d9!important}
  .bottom-nav .nav-btn{background:rgba(22,27,34,.7)!important;border-color:rgba(240,246,240,.1)!important;color:#e6edf3!important}
  .bottom-nav .nav-btn:hover{background:rgba(45,106,79,.25)!important;border-color:#3fb950!important}
  .empty-state{color:#6e7681!important}
  .toast{background:rgba(22,27,34,.95)!important;color:#e6edf3!important}
}
@media (prefers-color-scheme:dark){
  .desc-card p strong,.desc-card p b{color:#e6edf3!important}
}

/* ===== Header ===== */
.header{position:sticky;top:0;z-index:100;background:rgba(240,246,243,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(45,106,79,.1);padding:16px 16px 0;text-align:center}
.header h1{font-size:1.25rem;font-weight:700;color:#2D6A4F;letter-spacing:-.01em;margin-bottom:2px}
.header .subtitle{font-size:.75rem;color:#6b8a7a;margin-bottom:2px}

/* ===== Search ===== */
.search-wrap{padding:10px 16px 12px}
.search-input{width:100%;max-width:480px;margin:0 auto;display:block;padding:10px 16px 10px 40px;border:1.5px solid rgba(45,106,79,.15);border-radius:24px;font-size:.9rem;background:rgba(255,255,255,.6);color:#1a1a2e;outline:none;transition:all .2s;font-family:inherit}
.search-input:focus{border-color:#2D6A4F;box-shadow:0 0 0 3px rgba(45,106,79,.1);background:rgba(255,255,255,.9)}
.search-input::placeholder{color:#9bb5a8}
.search-icon{position:absolute;left:28px;top:50%;transform:translateY(-50%);color:#9bb5a8;pointer-events:none;width:18px;height:18px}
.search-wrap-inner{position:relative;max-width:480px;margin:0 auto}

/* ===== Tabs ===== */
.tab-bar{display:flex;gap:4px;padding:0 16px 12px;justify-content:center;flex-wrap:wrap}
.tab{padding:8px 18px;border-radius:20px;border:1.5px solid transparent;font-size:.82rem;cursor:pointer;transition:all .2s;background:transparent;color:#5a7a6a;font-family:inherit;white-space:nowrap;user-select:none}
.tab:hover{background:rgba(45,106,79,.08);color:#2D6A4F}
.tab.active{background:rgba(45,106,79,.12);color:#2D6A4F;border-color:rgba(45,106,79,.3);font-weight:600}
.tab .count{font-size:.7rem;opacity:.65;margin-left:4px}

/* ===== Card List ===== */
.list-wrap{padding:0 12px 80px;max-width:900px;margin:0 auto}
.group-header{padding:12px 8px 6px;font-size:.78rem;font-weight:600;color:#6b8a7a;display:flex;align-items:center;gap:8px}
.group-header::after{content:'';flex:1;height:1px;background:rgba(45,106,79,.12);border-radius:1px}

/* ===== Card ===== */
.card{display:flex;width:100%;text-align:left;gap:12px;padding:12px;margin-bottom:8px;background:rgba(255,255,255,.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(45,106,79,.08);border-radius:16px;cursor:pointer;transition:all .2s;overflow:hidden;font-family:inherit}
.card:hover{transform:scale(1.01);background:rgba(255,255,255,.85);border-color:rgba(45,106,79,.2);box-shadow:0 4px 20px rgba(45,106,79,.08)}
.card:active{transform:scale(.985)}
.card:focus-visible,.tab:focus-visible,.back-btn:focus-visible,.nav-arrow:focus-visible,.nav-btn:focus-visible{outline:3px solid rgba(45,106,79,.35);outline-offset:2px}
.card .img-col{flex-shrink:0;width:72px}
.img-wrap{width:72px;height:56px;background:rgba(255,255,255,.8);border-radius:12px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(0,0,0,.06);overflow:hidden}
.img-wrap img{max-width:90%;max-height:90%;object-fit:contain;image-rendering:auto}
.card .text-col{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:2px}
.card .code{font-family:'SF Mono','Cascadia Code','Consolas',monospace;font-size:.75rem;color:#8a9e94;letter-spacing:.03em;line-height:1}
.card .name{font-size:.9rem;font-weight:600;color:#1a1a2e;line-height:1.3}
.card .desc{font-size:.75rem;color:#6b7a72;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* ===== Empty ===== */
.empty-state{text-align:center;padding:60px 20px;color:#9bb5a8}
.empty-state .icon{width:54px;height:54px;margin:0 auto 12px;opacity:.45;color:currentColor}
.empty-state .text{font-size:.9rem}

/* ===== Detail Page ===== */
.detail-page{display:none;min-height:100vh;padding-bottom:100px}
.detail-page.show{display:block}

/* Detail Nav */
.detail-nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:rgba(240,246,243,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(45,106,79,.1)}
.detail-nav .back-btn{display:flex;align-items:center;gap:4px;padding:6px 10px;border:none;background:transparent;color:#2D6A4F;font-size:.85rem;cursor:pointer;border-radius:8px;transition:all .15s;font-family:inherit}
.detail-nav .back-btn:hover{background:rgba(45,106,79,.1)}
.detail-nav .back-btn svg{width:20px;height:20px}
.detail-nav .nav-arrows{display:flex;align-items:center;gap:2px}
.detail-nav .nav-arrow{padding:6px 8px;border:none;background:transparent;color:#2D6A4F;cursor:pointer;border-radius:8px;transition:all .15s;font-size:1.1rem;line-height:1}
.detail-nav .nav-arrow:hover{background:rgba(45,106,79,.1)}
.detail-nav .nav-arrow:active{transform:scale(.9)}
.detail-nav .nav-count{font-size:.78rem;color:#6b8a7a;min-width:56px;text-align:center;user-select:none}

/* Detail Content */
.detail-content{max-width:600px;margin:0 auto;padding:24px 16px;display:flex;flex-direction:column;align-items:center}
.detail-img-wrap{width:200px;height:160px;background:rgba(255,255,255,.8);border-radius:16px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(45,106,79,.1);margin-bottom:16px;overflow:hidden}
.detail-img-wrap img{max-width:90%;max-height:90%;object-fit:contain;image-rendering:auto}
.detail-code{font-family:'SF Mono','Cascadia Code','Consolas',monospace;font-size:1.1rem;color:#2D6A4F;margin-bottom:4px;letter-spacing:.04em}
.detail-name{font-size:1.35rem;font-weight:700;color:#1a1a2e;margin-bottom:20px;text-align:center}

/* Description Card */
.desc-card{width:100%;background:rgba(255,255,255,.55);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(45,106,79,.08);border-radius:16px;padding:20px;margin-bottom:24px}
.desc-card p{font-size:.9rem;line-height:1.75;color:#3a4a40;margin-bottom:12px}
.desc-card p:last-child{margin-bottom:0}
.desc-card p strong,.desc-card p b{color:#1a1a2e}

/* Bottom Nav */
.bottom-nav{display:flex;align-items:center;justify-content:center;gap:16px;padding:0 16px}
.bottom-nav .nav-btn{display:flex;align-items:center;gap:8px;padding:12px 18px;border:1.5px solid rgba(45,106,79,.15);border-radius:14px;background:rgba(255,255,255,.55);color:#2D6A4F;cursor:pointer;transition:all .2s;font-family:inherit;font-size:.85rem;user-select:none}
.bottom-nav .nav-btn:hover{background:rgba(45,106,79,.1);border-color:#2D6A4F}
.bottom-nav .nav-btn:active{transform:scale(.95)}
.bottom-nav .nav-btn .label{font-size:.75rem;opacity:.6}
.bottom-nav .nav-btn .val{font-weight:600;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bottom-nav .spacer{flex:1;max-width:20px}

/* ===== List Page ===== */
.list-page{display:block;min-height:100vh;padding-bottom:80px}
.list-page.hide{display:none}

/* ===== Toast ===== */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(26,26,46,.9);color:#fff;padding:10px 20px;border-radius:20px;font-size:.82rem;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.toast.show{opacity:1}

/* ===== Responsive ===== */
@media (max-width:640px){
  .header h1{font-size:1.1rem}
  .tab{font-size:.75rem;padding:6px 14px}
  .card{padding:10px;gap:10px}
  .card .img-col{width:60px}
  .img-wrap{width:60px;height:48px;border-radius:10px}
  .card .name{font-size:.82rem}
  .card .desc{font-size:.72rem}
  .detail-img-wrap{width:160px;height:128px}
  .detail-name{font-size:1.15rem}
  .bottom-nav .nav-btn{padding:10px 14px;font-size:.8rem}
  .list-wrap{padding:0 8px 80px}
}
@media (max-width:380px){
  .card .img-col{width:52px}
  .img-wrap{width:52px;height:42px;border-radius:8px}
  .card{gap:8px;padding:8px}
}
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<div class="header">
  <h1>🗺️ 定向地图图例库</h1>
  <div class="subtitle">Orienteering Map Legend Reference</div>
  <div class="search-wrap">
    <div class="search-wrap-inner">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" class="search-input" id="searchInput" placeholder="搜索编号或名称..." autocomplete="off">
    </div>
  </div>
  <div class="tab-bar" id="tabBar">
    <button class="tab active" data-std="all">全部<span class="count" id="countAll"></span></button>
    <button class="tab" data-std="isom2017">ISOM 2017-2<span class="count" id="countISOM"></span></button>
    <button class="tab" data-std="issprom2019">ISSprOM 2019-2<span class="count" id="countISS"></span></button>
  </div>
</div>

<!-- ===== LIST PAGE ===== -->
<div class="list-page" id="listPage">
  <div class="list-wrap" id="listWrap"></div>
  <div class="empty-state" id="emptyState" style="display:none">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-4-4"/></svg>
    <div class="text">没有找到匹配的图例</div>
  </div>
</div>

<!-- ===== DETAIL PAGE ===== -->
<div class="detail-page" id="detailPage">
  <div class="detail-nav">
    <button class="back-btn" id="backBtn" title="返回列表">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      返回
    </button>
    <div class="nav-arrows">
      <button class="nav-arrow" id="prevBtn" title="上一个">◀</button>
      <span class="nav-count" id="navCount"></span>
      <button class="nav-arrow" id="nextBtn" title="下一个">▶</button>
    </div>
  </div>
  <div class="detail-content">
    <div class="detail-img-wrap">
      <img id="detailImg" src="" alt="">
    </div>
    <div class="detail-code" id="detailCode"></div>
    <div class="detail-name" id="detailName"></div>
    <div class="desc-card" id="descCard"></div>
    <div class="bottom-nav">
      <button class="nav-btn" id="bottomPrev">
        <span style="font-size:1.1rem">◀</span>
        <div><div class="label">上一个</div><div class="val" id="prevLabel"></div></div>
      </button>
      <button class="nav-btn" id="bottomNext">
        <div style="text-align:right"><div class="label">下一个</div><div class="val" id="nextLabel"></div></div>
        <span style="font-size:1.1rem">▶</span>
      </button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>

const ISOM_DATA = [{"code":"101","name":"首曲线（基本等高线）","description":"首曲线是地面上高程相等的各相邻点所连成的闭合曲线。标 准等高距为5 m。对于平坦地貌，可使用2.5 m的等高距。 示坡线绘制在首曲线较低的一侧用来指示下坡方向，使用时 将示坡线放置在山凹处。 可用闭合的首曲线绘制小丘或凹地。用首曲线绘制凹地时至 少要绘制一条示坡线。用首曲线绘制的小丘最小高度或凹地的最 小深度应为1 m。 相邻首曲线之间的关系非常重要。相邻的首曲线可表示出地 貌的形状和结构。首曲线上应该避免出现小细节，以防止其遮盖 地貌的主要特征。 突出的地貌特征，如凹地，山凹，山凸，土崖和台地可能会 被夸大绘制。 绝对高程并不那么重要，但相邻特征之间的相对高度应在地 图上尽可能准确地绘制出来。为更突出地貌特征，允许稍微改变0.14 0.140.4min = 最小尺寸 14首曲线位置，但变化不应超过等高距的25%，且必须注意相邻特 征物的位置。 首曲线最小弯曲处外端顶线中心到主线所处线中心的距离为 。山凹口或山凸两侧等高线中心到中心 间距最少0.5 mm（符号占地8m）。 首曲线绘制的小丘最小长度为0.9 mm（符号占地13.5 m）， 最小宽度为0.6 mm（符号占地9 m）。较小的突出小丘可以用符 号“圆形土堆（109）”或“狭长土堆（110）”绘制，也可以夸 大绘制以满足符号最小尺寸规定","icon":"images/isom2017img/101.png","standard":"isom2017"},{"code":"102","name":"计曲线（加粗等高线）","description":"为快速判读高度差和地貌的整体起伏，每隔四条首曲线必须 绘制一条较粗的计曲线。在细节较多的区域可以用首曲线代替。 用等高线绘制小丘或凹地时通常不使用计曲线绘制。 在平坦地貌中必须仔细选择计曲线的位置。最理想的是选取 最能凸显斜坡的重要等高线作为计曲线。计曲线可以绘制等高线 注记。等高线注记只能放置在计曲线不遮挡细节的位置。等高线 注记顶部方向必须朝向等高线的较高侧。等高线注记（文本）高 必须为1.5 mm，字体使用无衬线字体","icon":"images/isom2017img/102.png","standard":"isom2017"},{"code":"103","name":"间曲线（半距等高线）","description":"若需提供更多有关地面起伏的信息，则使用间曲线绘制。只 有在首曲线不能完整描述地貌的情况下才会使用间曲线。间曲 线不得用在两等高线的中间插值线位置。相邻等高线之间只能使 用一条间曲线。间曲线和等高线体系逻辑上吻合非常重要，因此 间曲线的起止处应与相邻等高线平行。间曲线虚线的间断处必须 放在合理的直线部分上。间曲线可用于区分土丘或凹地（最小高 度/深度应为1 m）是否扁平或明显。必须避免过度使用间曲线， 因为这会干扰地貌的三维图像，并使地图阅读复杂化。 最小长度（非闭合）：两段线划。 最小尺寸绘制的小丘和凹地：外部尺寸为1.1 mm（符号占地 ）","icon":"images/isom2017img/103.png","standard":"isom2017"},{"code":"104","name":"土崖","description":"土崖（土坎）是指可与周围环境明显区分出来的地面高度骤 变的地貌，例如（砾石坑或沙坑、公路或铁路的路堑或路堤）。 最小高度：1 m。土崖可能会影响奔跑速度。齿线的长度表 示整个土崖坡面的水平延伸范围。 对于长土崖，末端允许使用短于最小长度的齿线。如果两个 土崖紧邻，则可以省略齿线。难以翻越的土崖必须使用“难以翻 越的石崖（201）”绘制。 最小长度：0.6 mm（符号占地9 m）","icon":"images/isom2017img/104.png","standard":"isom2017"},{"code":"105","name":"土垄","description":"明显的土垄。最小高度：1 m。 最小长度：1.4 mm（符号占地21 m)","icon":"images/isom2017img/105.png","standard":"isom2017"},{"code":"106","name":"残破的土垄","description":"残破的或不明显的土垄。最小高度：0.5 m。 最小长度：两段线划(3.65 mm-符号占地55 m)。如果更短,则 符号必须被夸大到最小长度或改用符号“土垄(105)”绘制","icon":"images/isom2017img/106.png","standard" 特殊的地形特征。岩壁除了可以帮助运动员读图和提供寻找检查点的特征 外，还包含了这种地形的危险性和通行性等有用信息。岩壁用黑色来绘制，以区别于其它 类型的地形特征。必须注意确保石崖等岩壁特征与等高线所示的地貌的下坡方向的一致 性","icon":"images/isom2017img/115.png","standard":"isom2017"},{"code":"201","name":"难以翻越的石崖","description":"难以翻越、攀爬或有危险的石崖、采石场或非常高且陡峭的 难以翻越土崖。 对于垂直的岩壁，如果图上位置不足，则可以省略石崖的齿 线。基线的末端可以是圆形也可以是平的。两端可使用较短的齿 线。 两个难以翻越的石崖之间或难以翻越的石崖与其他难以翻越 的重要符号之间的距离在地图上必须超过0.25 mm。 当难以翻越的石崖垂直落入水中，运动员无法沿着石崖的下 边缘穿越时，可以忽略水岸线，或者齿线必须清晰地延伸到水岸 线上。难以翻越的石崖下坡方向应与等高线下坡方向相对应。 最小长度：0.6 mm(符号占地9 m)。 颜色：黑色","icon":"images/isom2017img/201.png","standard":"isom2017"},{"code":"202","name":"可翻越的石崖","description":"可翻越的石崖（岩壁）或采石场。如果从等高线上不能明显 看出石崖的下坡方向，或为了提高易读性，应在下坡方向绘制短 的齿线。 对于非垂直的石崖，齿线长度表示石崖坡面的水平延伸范 围。如果不绘制齿线，基线的两端必须是圆的。两石崖之间的通 道最小间距为0.15 mm。石崖下坡方向应该与等高线下坡方向相 对应。 翻越石崖一般会降低奔跑速度。 最小高度：1 m。 最小长度：0.6 mm(符号占地9 m)","icon":"images/isom2017img/202.png","standard":"isom2017"},{"code":"203","name":"岩坑或山洞","description":"可能对运动员构成危险的岩坑、土坑、山洞或矿井。 符号的重心是实地精确位置，除具有明显入口的山洞除外， 符号方向必须朝北，绘制山洞时该符号方向应指向洞口外。 直径大于5 m的岩坑应使用符号“石崖(201、202)”夸大绘 制。 最小深度：1 m。 符号占地：10.5 m×12 m","icon":"images/isom2017img/203.png","standard":"isom2017"},{"code":"204","name":"石块","description":"可以在地面上快速辨识出的突出石块（高度大于1 m）。成 群的石块使用符号“石群（207）”或“石块地（208、209）” 绘制。 为了能够突出相邻（距离30 m内）石块在大小上有明显差 异，允许将某些石块的符号直径放大至0.5 mm。 符号占地：直径6 m（放大后直径7.5 m）","icon":"images/isom2017img/204.png","standard":"isom2017"},{"code":"205","name":"大石块","description":"特别大而明显的石块。大石块高应超过2 m。为了能够突出 相邻（距离30 m内）石块在大小上有明显差异，允许将某些大石 块的符号缩小至0.5 mm。 符号占地：直径9m（缩小后直径7.5 m）。 颜色：黑色。min. 0.65 0.12 0.50.4 0.25 0.160.7 (ø 0.5)最大. 2.0 (ø 0.5)最大. 2.0","icon":"images/isom2017img/205.png","standard":"isom2017"},{"code":"206","name":"巨石或岩柱","description":"必须按平面轮廓形状绘制超大的石块、岩柱或巨大的岩壁。 实地中特征物的形状和尺寸可能和插图不同。 在地图上，巨石之间或巨石与其他难以翻越的特征符号之间 的间距必须超过0.15mm。 最小宽度：0.25 mm（符号占地3.75 m）。 最小面积：0.3 mm²（符号占地67 m²）","icon":"images/isom2017img/206.png","standard":"isom2017"},{"code":"207","name":"石群","description":"众多堆积在一起无法单独绘制的石头。石群中的石块应高于 。石群必须为一组易于识别的石块群。 为了能够显示相邻（距离30 m内）石群之间大小的显著差 异，允许将该符号放大至120%（边缘长度0.96 mm）。 符号方向朝北。 符号占地：12 m×10 m","icon":"images/isom2017img/207.png","standard":"isom2017"},{"code":"208","name":"石块地","description":"随机分布着众多无法单独绘制的石块的区域，绘制为随 机放置和随机朝向的实心三角形，边长比为8:6:5（内部角 度：92.9°、48.5°、38.6°）。石块地通常不会影响通行性。 如果石块地的通行性受到影响，则应使用符号”密集的石块地 (209）”绘制，或者将它与碎石地符号叠加使用。 至少应绘制两个三角形。如果一个三角形与其他岩石符号叠 加在一起（例如，符号在“石崖（201、202）”下侧，与“石块 （204-206）”相邻或与“碎石地（210-212）”叠加），则可以 使用一个三角形。 相邻三角形之间的中心最大间距为1.2 mm。相邻三角形之间 的中心最小间距为0.75 mm。 密度：0.8-1个符号/mm²。为了能够显示在石块地内高度差 异明显的区域，可以将部分三角形放大至120％。 单个三角形的占地尺寸：12 m×6 m。 (0.96)最大. 2.00.80.8","icon":"images/isom2017img/208.png","standard":"isom2017"},{"code":"209","name":"密集石块地","description":"随机分布着众多无法单独绘制的石块的区域，并且影响了 通行性。绘制为随机放置和随机朝向的实心三角形，边长为8：6 ：5（内部角度：92.9°、48.5°、38.6°）。最小符号尺寸至 少绘制两个三角形。 相邻三角形之间的中心最大间距为0.6 mm。 密度：2-3个符号/mm²。为了能够在石块地中突出具有明显 高度差的区域，可以将部分三角形放大至120％。 单个三角形的占地尺寸：12 m×6 m","icon":"images/isom2017img/209.png","standard":"isom2017"},{"code":"210","name":"慢跑碎石地","description":"分布着碎石或小石块的地面，通行性受影响降低至正常速 度的60％-80％。 图中点应随机分布，但不应干扰重要地貌特征和地物的绘 制。插图密度仅供参考，点符号（单点）也可以用来绘制碎石 地。 最少应绘制3个点(符号占地10 m×10 m)。邻近点之间的中心 最大间距为0.6 mm。 相邻点之间的中心最小间距为0.45 mm。 密度：3-4个点/mm²。 为避免与符号“明显的植被界线（416）”混淆,不得排列成 单点线的式样","icon":"images/isom2017img/210.png","standard":"isom2017"},{"code":"211","name":"慢行碎石地","description":"分布着碎石或小石块的地面，严重影响了通行性（降至正常 速度的20-60％）。 图中点应随机分布，但不应干扰重要地貌特征和地物的绘 制。插图密度仅供参考，也可用点状符号来绘制碎石地。 最少应绘制3个点(符号占地寸8 m×8 m)。相邻点之间的中心 最大间距为0.4 mm。 相邻点之间的中心最小间距为0.32 mm。 密度：6-8个点/mm²。 为避免与符号“明显植被界线（416）”混淆,不得排列成单 点线的式样","icon":"images/isom2017img/211.png","standard":"isom2017"},{"code":"212","name":"难行碎石地","description":"分布着碎石或小石块的难通行(低于正常速度的20%)地面。 地图中点应随机分布，但不应干扰重要地貌特征和地物的绘 制。插图密度仅供参考，也可以用点状符号来绘制碎石地。 最少应绘制3个点(符号占地7 m×7 m)。相邻点之间的中心 最大间距为0.32 mm。相邻点之间的中心最小间距为0.25 mm。密 度：10-12个点/mm²。 为避免与符号“明显的植被界线（416）”混淆,不得排列成 单点线的式样","icon":"images/isom2017img/212.png","standard":"isom2017"},{"code":"213","name":"空旷的沙地","description":"具有软沙的空旷地面，其通行性降低至正常奔跑速度的80% 以下。符号方向朝北。 最小面积：1 mm×1 mm(符号占地15 m×15 m)","icon":"images/isom2017img/213.png","standard":"isom2017"},{"code":"214","name":"裸岩地","description":"没有泥土或植被覆盖的可通行的岩面区域应绘制为裸岩地。 覆盖有草、苔藓或其他低矮植被的岩石区域不得使用裸岩地 符号绘制。 通行性降低的裸岩区域应使用符号“碎石地（210-212）” 绘制。 最小面积：1 mm×1 mm(符号占地15 m×15 m)","icon":"images/isom2017img/214.png","standard":"isom2017"},{"code":"215","name":"壕沟","description":"天然或人工的壕沟（堑壕）。例如：战壕。 最小深度应为1 m。 最小长度：1 mm(符号占地15 m)。 较短的壕沟可夸大至最小尺寸绘制。难以翻越的壕沟必须使 用符号“难以翻越的石崖（201）”绘制。 侧壁坍塌或易于翻越的壕沟应绘制成冲沟。 0.45(CC)ø 0.16 223.3 水体和沼泽3.3 水体和沼泽 本节既包括开阔的水体，也包括由于水（沼泽）的存在而形成的特殊类型的植被。水 系分类很重要，因为它表示了通行性，并为读图和寻找检查点提供了参考特征。水域的轮 廓线绘制为黑色粗线时表示它难以穿越（徒涉）。本节中列出的符号可能仅在某些季节有 水。沼泽符号可与表示通视性（黄色）和通行性（绿色和黄色）的面状符号叠加使用","icon":"images/isom2017img/215.png","standard":"isom2017"},{"code":"301","name":"难以穿越的水域","description":"黑色的轮廓线强调该水域是难以穿越的。 大面积的水域可以使用70%蓝色绘制，小面积的水域和狭窄 部分必须始终用100%蓝色绘制。 最小宽度(内部)：0.3 mm。 最小面积(内部)：0.55 mm×0.55 mm(符号占地8 m×8 m)","icon":"images/isom2017img/301.png","standard":"isom2017"},{"code":"302","name":"可穿越的浅水域","description":"季节性或周期性的浅水域可以用带虚线轮廓的符号绘制。较 小的可穿越的浅水域可以用100％蓝色绘制（无轮廓）。 最小宽度(内侧尺寸)：0.3 mm。 最小面积( 内侧尺寸):0.7mm×0.7mm( 符号占地10.5m×10.5m )。 最小宽度(100%蓝色)：0.3 mm。 最小面积(100%蓝色)：0.55mm×0.55mm(符号占地8m×8m)","icon":"images/isom2017img/302.png","standard":"isom2017"},{"code":"303","name":"水坑","description":"积满水的水坑或因面积太小而无法依比例绘制的水域。 符号的重心是实地精确位置，符号方向朝北。 符号占地：10.5 m×12 m","icon":"images/isom2017img/303.png","standard":"isom2017"},{"code":"304","name":"可穿越的水道","description":"宽度至少2 m。 最小长度(独立使用时)：1 mm(符号占地15 m)","icon":"images/isom2017img/304.png","standard":"isom2017"},{"code":"305","name":"可穿越的小水道","description":"最小长度(独立使用时)：1 mm(符号占地15 m)","icon":"images/isom2017img/305.png","standard":"isom2017"},{"code":"306","name":"次要/季节性水渠","description":"可能季节性有水的天然或人造的次要水渠。 最小长度( 独立使用时 )：两段线划(2.75 mm-符号占地41 m)","icon":"images/isom2017img/306.png","standard":"isom2017"},{"code":"307","name":"难以穿越的沼泽","description":"难以穿越或对运动员可能存在危险的沼泽。黑色轮廓强调该 符号是难以穿越的。本符号与“难以穿越的水域（301）”符号 之间的黑色边线可省略。本符号可以与“凌乱空旷地（403、404 ）”符号叠加以表示通视性。至少绘制两条清晰可见的蓝色线 划。 符号方向朝北。 最小宽度：两条线划或0.8 mm(内侧尺寸)。 较小的区域必须被忽略、放大或使用符号“不可穿越的水域 （301）”绘制","icon":"images/isom2017img/307.png","standard":"isom2017"},{"code":"308","name":"可穿越的沼泽","description":"可穿越的有明显边界的沼泽。 该符号必须与其他符号叠加使用,以显示通行性和通视性。 符号方向朝北。 最小面积：0.5 mm×0.4 mm(符号占地7.5 m × )","icon":"images/isom2017img/308.png","standard":"isom2017"},{"code":"309","name":"狭窄的沼泽","description":"因太狭窄(宽度小于5 m)而不能用“可穿越的沼泽（308）” 符号绘制的沼泽或涓涓细流。 最小长度(独立使用时)：两个点(0.7 mm-符号占地10.5 m)","icon":"images/isom2017img/309.png","standard":"isom2017"},{"code":"310","name":"不明显的沼泽","description":"可穿越的不明显的季节性沼泽或从沼泽到坚实地面的过渡区 域。通常边界不明显，植被与周围区域相似。 该符号必须与其他符号叠加以显示通行性和通视性。符号方 向朝北。 最小面积：2.0 mm×0.7 mm（符号占地30 m×10.5 m）","icon":"images/isom2017img/310.png","standard":"isom2017"},{"code":"311","name":"井、喷泉或蓄水池","description":"突出的水井、喷泉、蓄水池或围起的泉源。 符号占地：12 m×12 m。 颜色：蓝色","icon":"images/isom2017img/311.png","standard":"isom2017"},{"code":"312","name":"泉源","description":"水的源头。 符号的重心是实地精确位置，符号的方向朝向下游。 符号占地：13.5 m×7 m","icon":"images/isom2017img/312.png","standard":"isom2017"},{"code":"313","name":"突出的特殊水体","description":"符号方向朝北。必须在地图上给出符号定义。","icon":"images/isom2017img/313.png","standard":"isom2017"},{"code":"401","name":"空旷地","description":"具有地面覆盖物（草，苔藓或类似植物）的空旷地，比典型 的“好跑树林（405）”具有更好的通行性。如果地图中黄色区 域占主导颜色比例时，则可以使用75％黄色代替100%黄色。 除“坑洼地面（113）”，“石块地（208）”，“可穿越的 沼泽（308）”和“不明显的沼泽（310）”以外，不得与其他面 状符号叠加使用。 最小面积：0.55 mm×0.55 mm（符号占地8 m×8 m）","icon":"images/isom2017img/401.png","standard":"isom2017"},{"code":"402","name":"稀树空旷地","description":"在黄色面状符号上排列规则的点状孔用以表示在空旷地上零 散分布着零星树木或灌木丛的区域。这些点可以是白色（零散分 布的乔木）或绿色（零散分布的灌木/灌木丛）。也可以使用符 号“突出的大树（417）”来绘制特别突出的树。如果黄色区域 占主导颜色比例时，则可以使用75％黄色代替100%黄色。 最小宽度：1.5 mm（符号占地22.5 m）。 最小面积：2 mm×2 mm（符号占30 m×30 m）。 更小的区域必须省略、夸大或用“空旷地（401）”绘制。 符号方向朝北。 颜色：黄色（或75％黄色），带有白色或60％绿色的孔。100%","icon":"images/isom2017img/402.png","standard":"isom2017"},{"code":"403","name":"凌乱空旷地","description":"具有与典型好跑树林相同通行性的荒地、高沼地、砍伐地、 新种植树木区（树木约低于1 m）或其他具有凌乱地表植被如： 具有帚石楠地或高草地的空旷地。 可与以下植被符号相叠加：“通视性好的慢跑矮植被（407 ）”或“通视性好的慢行矮植被（409）”以表示通行性降低。 最小面积：1 mm×1 mm(符号占地15 m×15 m)。 更小的区域必须省略、夸大或使用“空旷地（401）”绘 制","icon":"images/isom2017img/403.png","standard":"isom2017"},{"code":"404","name":"凌乱稀树空旷地","description":"在黄色面状符号上排列规则的点状图案用以表示在空地上零 散分布着树木或灌木丛的区域。 点可以是白色的（零散分布的乔木）或绿色的（零散分布的 灌木/灌木丛）。只有使用带白色点的符号形式时可以与以下植 被符号叠加使用以表示通行性降低：“通视性好的慢跑矮植被 （407）”或“通视性好的慢行矮植被（409）”。 符号方向朝北。 最小宽度：1.5 mm(符号占地22.5 m)。 最小面积：2.5 mm×2.5 mm(符号占地37.5 m×37.5 m)。 更小的区域必须省略、夸大或使用“凌乱空旷地（403）” 绘制","icon":"images/isom2017img/404.png","standard":"isom2017"},{"code":"405","name":"好跑树林","description":"典型的好跑树林。如果没有可以轻松通行的树林区域，则地 图上不应出现白色。 最小面积：位于其他颜色区域中的孔1 mm×1 mm（符号 占地15 m×15 m）；但以下植被符号除外：“慢行植被（408 ）”中最小面积为0.7 mm×0.7 mm（符号占地10.5 m×10.5 m） 。“空旷地（401）”中最小面积为0.7 mm×0.7 mm（符号占 地10.5 m×10.5 m）。“难行植被”（410）中最小面积为 ×0.55 mm（符号占地8 m×8 m）","icon":"images/isom2017img/405.png","standard":"isom2017"},{"code":"406","name":"慢跑植被","description":"植被茂密（通视性较差）的区域，通行速度降低至正常速度 的60-80％。 在某方向上具有更好通行性时，应在30%绿色面状符号上叠 加规则的白色条纹，以表示好跑的方向。 最小面积：1 mm×1 mm（符号占地15 m×15 m）。 最小宽度：0.4 mm（符号占地6 m）","icon":"images/isom2017img/406.png","standard":"isom2017"},{"code":"407","name":"通视性好的慢跑矮植被","description":"通视性好但通行性降低至慢跑的下层矮植被，植被类型通常 为矮灌木(荆棘、帚石楠、矮灌木丛、修剪后的树枝等)。奔跑速 度降低至正常速度的60-80％。 符号方向朝北。 最小面积：1.5 mm×1 mm（符号占地22.5 m×15 m）","icon":"images/isom2017img/407.png","standard":"isom2017"},{"code":"408","name":"慢行植被","description":"有茂密树木或灌木丛（通视性低）的区域，通行速度降低至 正常速度的20-60％。 在某方向上具有更好通行性时，应在60%绿色面状符号上叠 加规则的白色/30％绿色条纹，以表示好跑方向。 最小面积：0.7 mm×0.7 mm（符号占地10.5 m×10.5 m）。 最小宽度：0.3 mm（符号占地4.5 m）","icon":"images/isom2017img/408.png","standard":"isom2017"},{"code":"409","name":"通视性好的慢行矮植被","description":"通视性好但通行性降低至慢行的下层矮植被，植被类型通常 为矮灌木（荆棘、帚石楠、矮灌木丛、修剪后的树枝等下层矮植 被）。通行速度降低至正常速度的20-60％。 使用符号“难行植被（410）”来绘制难以穿越或无法通行 但通视性较好的区域。 符号方向朝北。 最小面积：1 mm×1 mm（符号占地15 m×15 m）","icon":"images/isom2017img/409.png","standard":"isom2017"},{"code":"410","name":"难行植被","description":"几乎无法通行的具有茂密植被（树木或灌木丛）的区域，通 行速度降低至正常速度的20％以下。 在某方向上具有更好通行性时，应在绿色面状符号上叠加规 则的白色/30％绿色/60％绿色条纹，以表示好跑方向。 最小面积：0.55 mm×0.55 mm（符号占地8 m×8 m）。 最小宽度：0.25 mm（符号占地3.8 m）","icon":"images/isom2017img/410.png","standard":"isom2017"},{"code":"412","name":"耕地","description":"耕地，通常用于种植农作物。通行性可能因所种植的农作物 种类及季节而有所不同。对于种植农业林的区域，可以使用“好 跑树林（405）”或“稀树空旷地（402）”代替本符号。 由于通行性可能会有所不同，因此在线路设计时应避免穿越 此类区域。 该符号与符号“禁区（709）”叠加使用，以绘制禁止进入 的耕地。 符号方向朝北。 最小面积：3 mm×3 mm(符号占地45 m×45 m）","icon":"images/isom2017img/412.png","standard":"isom2017"},{"code":"413","name":"果园","description":"通常以规则的方式种植果树或灌木的区域。规则点连线的 方向可以表示种植方向。 必须与符号“空旷地（401）”或“凌乱空旷地（403）”叠 加使用。 可以与“通视性好的慢跑矮植被（407）”或“通视性好的 慢行矮植被（409）”叠加使用以表示通行性降低。 最小面积：2 mm×2 mm（符号占地30 m×30 m）","icon":"images/isom2017img/413.png","standard":"isom2017"},{"code":"414","name":"葡萄园或类似区域","description":"葡萄园或类似植被的种植区，种植着浓密的单行植被，但在 种植方向上好跑。线的方向必须指示种植方向。应至少绘制三行 清晰可见的绿色线划。必须与符号“空旷地（401）”或“凌乱 空旷地（403）”叠加使用。 最小面积：2 mm×2 mm（符号占地30 m×30 m）","icon":"images/isom2017img/414.png","standard":"isom2017"},{"code":"415","name":"明显的种植界线","description":"耕种植被（符号401、412、413、414）的界线或未用其他符 号（围栏、墙、路径等）绘制的耕地之间的界线。 最小长度：2 mm（符号占地30 m）","icon":"images/isom2017img/415.png","standard":"isom2017"},{"code":"416","name":"明显的植被界线","description":"树林中明显的植被分界线或明显的树林界线。 在同一幅地图上只能使用一种植被界线符号（黑色虚线或绿 色虚线）。对于具有大量岩石特征的区域，建议使用绿色虚线的 植被界线。 绿色虚线的缺点是不能用于绘制“难行植被（410）”周围 和内部的明显的植被界线。这种情况下的解决方法是使用符号“ 明显的种植界线（415）”代替。 最小长度，黑色虚线：5个点（2.0mm-符号占地30 m）。 最小长度，绿色虚线：4段线划（1.8 mm-符号占地27 m）。 颜色：深绿色（线状虚线）/黑色（点状虚线）。min.ø 0.2 0.8 面状0.14","icon":"images/isom2017img/416.png","standard":"isom2017"},{"code":"417","name":"突出的大树","description":"突出的独立大树（乔木），在绿色圆圈下方叠加白色底色 （OM-1.1mm），以提高其在黄色和绿色符号中的易读性。 符号占地：13.5 m×13.5 m","icon":"images/isom2017img/417.png","standard":"isom2017"},{"code":"418","name":"突出的灌木或树","description":"突出的独立灌木或乔木，应谨慎使用此符号，因为它很容易 被误认为是“圆形土堆（109）”符号。内部的小白点用来帮助 色觉受损的运动员辨别符号。 符号占地：9.0 m×9.0 m","icon":"images/isom2017img/418.png","standard":"isom2017"},{"code":"419","name":"突出的特殊植被","description":"白色底色叠加在绿“×”下使用，以提高其在黄色和绿色符 号中的易读性(白色底色的线宽为0.36 mm，其在符号两端的长度 必须为0.36 mm)。 符号方向朝北。 必须在地图上给出符号定义。 符号占地：13.5 m×13.5 m。 0.91.1 0.2 0.180.9 0.9 3.5 人工地物3.5 人工地物 道路和路网为运动员提供了重要信息，分类必须在地图上清晰可见。较小的车道和小 径的分类对运动员特别重要。分类不仅要考虑到宽度，还要考虑到对运动员来说这条路的 明显程度。在地图上必须很容易识别出对运动员构成阻碍或障碍的人工地物，例如围栏、 墙壁、建筑物和禁区都很重要。人工地物对于读图和寻找检查点都很重要","icon":"images/isom2017img/419.png","standard":"isom2017"},{"code":"501","name":"铺装地面","description":"有坚硬表面如沥青、硬砾石、瓷砖、混凝土等的区域。铺装 地面在实地有明显界线时应绘制一条黑线作为边线（或轮廓）。 最小面积：1 mm×1 mm（符号占地15 m×15 m）","icon":"images/isom2017img/501.png","standard":"isom2017"},{"code":"502","name":"宽公路","description":"宽度应依比例绘制，但绘制时不得小于符号的最小宽度 （0.3+2×0.14 mm -符号占地8.7 m）。如果特征物例如“围栏 （516）”、“难以穿越的围栏（518）”、“墙（513）”或“ 难以翻越的墙（515）”距离道路边缘很近，导致绘制时无法将 其显示为单独的符号，则可将公路外侧边线替换为其它黑色线状 符号。 黑线之间填充50%棕色。 一条有两列车道的公路可以用两个宽公路符号并排绘制，但 只在中间保留一条道路边线","icon":"images/isom2017img/502.png","standard":"isom2017"},{"code":"503","name":"公路","description":"在任何天气下都适合机动车行驶的宽度小于5 m的有养护的 公路","icon":"images/isom2017img/503.png","standard":"isom2017"},{"code":"504","name":"车道","description":"无养护的车道:仅适合低速驶车的车道或无养护的公路。 对于明显的路口，交会点处于实线线划部位。 对于不明显的路口，在交会点处不连接。 最小长度（独立使用时)：两段线划(6.25 mm-符号占地94 m)","icon":"images/isom2017img/504.png","standard":"isom2017"},{"code":"505","name":"步道","description":"好跑的步道、自行车道或旧车道。 对于明显的路口，交会点处于实线线划部位。 对于不明显的路口，在交会点处不连接。 最小长度(独立使用时):两段线划(4.25 mm-符号占地64 m)","icon":"images/isom2017img/505.png","standard":"isom2017"},{"code":"506","name":"小径","description":"泛指小路。可跑的小径或（临时）林业采伐道，可以按比赛 速度奔跑。 对于明显的路口，交会点处于实线线划部位。 对于不明显的路口，在交会点处不连接。 最小长度(独立使用时):两段线划(2.25 mm-符号占地34 m)","icon":"images/isom2017img/506.png","standard":"isom2017"},{"code":"507","name":"不明显小径","description":"不突出或不明显的可跑小径或林业采伐道。 最小长度：两段双划线（5.3 mm-符号占地79.5 m）","icon":"images/isom2017img/507.png","standard":"isom2017"},{"code":"508","name":"林中带状空隙","description":"在没有明显可跑路径地形上的树林空隙(例如：林间采伐 道，沙质道，滑雪道)或线性痕迹。通行性与周围环境不同时用 稍粗的黄色、绿色或白色底色线条叠加绘制。无底色线条时：代 表与周围环境具有相同的通行性。 100%黄色：易跑。 绿色中叠加白色背景线：正常奔跑速度。 30%绿色：慢跑。 60%绿色：慢行。 最小长度：两段线划(3.25 mm-符号占地48 m)","icon":"images/isom2017img/508.png","standard":"isom2017"},{"code":"509","name":"铁路","description":"铁路或其他类型的有轨轨道。 如果禁止沿铁路奔跑时必须与“禁行路线（711）”叠加使 用。如果铁路禁止翻越，必须与“禁区（520）”或“禁区（709 ）”叠加使用。 最小长度(独立使用时):两段线划（4 mm-符号占地60 m）","icon":"images/isom2017img/509.png","standard":"isom2017"},{"code":"510","name":"输电线、索道或滑雪缆车线","description":"输电线、索道或滑雪缆车线。横线表示塔架的实际位置。为 了提高易读性，绘制时主线可能会被剪断。 如果某段电力线、索道或滑雪缆车线沿着道路或小径架设（ 且不提供明显的导航价值）则应省略。 最小长度（独立使用时）：5mm（符号占地：75m）","icon":"images/isom2017img/510.png","standard":"isom2017"},{"code":"511","name":"主干输电线","description":"主干输电线应使用双线绘制。双线之间的间距可以表示输电 线的横向范围。为了提高易读性，主线可以会被剪断。横线表示 塔架的实际位置。超大承重塔架必须使用“建筑物（521）”符 号按平面轮廓绘制或使用符号“高塔（524）”","icon":"images/isom2017img/511.png","standard":"isom2017"},{"code":"512","name":"桥梁/隧道","description":"桥梁和隧道用相同的基础符号绘制。 如果隧道（或桥下）无法通过，则必须省略此符号。 最小长度（基线）：0.4 mm（符号占地6 m）。 连接车道/路径的小桥应将路径的线划中心放在通过处。路 径在穿过水道处剪断表示没有桥梁。两侧无路连接的小步桥用一 段横线绘制","icon":"images/isom2017img/512.png","standard":"isom2017"},{"code":"513.1","name":"可翻越的墙","description":"由石头、混凝土、木头或其他材料搭建的重要墙体。 最小高度：1 m。 最小长度(独立使用时)：1.4 mm(符号占地21 m)","icon":"images/isom2017img/513_1.png","standard":"isom2017"},{"code":"513.2","name":"可翻越的挡土墙","description":"由石头、混凝土、木材或其他材料搭建的仅从一侧可见的可 翻越的挡土墙。半点必须指向较低的一侧。 最小高度：1 m。 最小长度（独立使用时）：2.4 mm（符号占地36 m）","icon":"images/isom2017img/513_2.png","standard":"isom2017"},{"code":"514","name":"残破的墙","description":"残破的或不明显的墙。最小高度0.5m。 最小长度：两段线划（3.65 mm-占地55 m）。如果更短，符 号必须放大到最小尺寸或更改为符号“墙（513）”绘制","icon":"images/isom2017img/514.png","standard":"isom2017"},{"code":"515","name":"难以翻越的墙","description":"难以翻越的或难以穿越的墙，通常超过1.5m高。 最小长度(独立使用时)：3 mm(符号占地45 m)","icon":"images/isom2017img/515.png","standard":"isom2017"},{"code":"516","name":"围栏","description":"若围栏形成封闭区域，则齿线应朝向封闭区域内。 最小长度(独立使用时)：1.5 mm(符号占地22.5 m)","icon":"images/isom2017img/516.png","standard":"isom2017"},{"code":"517","name":"残破的围栏","description":"残破的或不明显的围栏。若围栏形成封闭区域，则齿线应朝 向封闭区域内。 最小长度：两段线划(3.65 mm-符号占地55 m)。如果更短， 符号必须放大到最小尺寸或更改为符号“围栏(516)”","icon":"images/isom2017img/517.png","standard":"isom2017"},{"code":"518","name":"难以穿越的围栏","description":"难以翻越的或难以穿越的围栏，通常超过1.5 m高。 若围栏形成封闭区域，则齿线应朝朝向封闭区域内。 最小长度(独立使用时)：2 mm(符号占地30 m)","icon":"images/isom2017img/518.png","standard":"isom2017"},{"code":"519","name":"通过点","description":"可穿过或翻越墙壁、围栏或其他线形特征的位置，包括围栏 门或翻越围墙、围栏所用的台阶、梯凳。 对于难以穿越的特征物，在通过点处必须剪断。对于可翻越 的特征物，如果通过点涉及一定程度的爬升，则在通过点处不得 剪断","icon":"images/isom2017img/519.png","standard":"isom2017"},{"code":"520","name":"禁区","description":"例如私人住宅、花园、工厂或其他工业区等特征的禁止进入 的区域。只有等高线和突出特征才可以绘制在禁区内，如铁路和 大型建筑物等。黑色垂直线条纹符号可用于显示地形完整绘制的 重要区域（例如，当森林的一部分是禁止进入的区域时）。当有 道路或小径穿过时，此部分禁区符号应中断绘制。 边界清晰的禁止进入的区域，应以黑色边线或其他类型的黑 色线绘制，如果边界不清晰，则不得绘制黑色边线。临时禁区可 使用线路设计符号709绘制。 该符号的黑色垂直条纹朝北。 不得进入“禁区”内部。 最小面积：1 mm×1 mm(符号占地15 m×15 m)","icon":"images/isom2017img/520.png","standard":"isom2017"},{"code":"521","name":"建筑物","description":"在条件允许的情况下，应依比例绘制所有建筑物的平面图。 城区中大于75 m×75 m的建筑物绘制时可填充深灰色。 穿过建筑群的通道最小宽度为0.3 mm（符号占地4.5 m）。 应简化绘制禁止进入区内的建筑物。 不得绘制完全包含在建筑物内的区域（应绘制为建筑物的一 部分）。建筑物之间、建筑物与其他不可通行特征之间间距的最 小值必须为0.4 mm。 最小面积：0.5 mm×0.5 mm（符号占地7.5 m×7.5 m）","icon":"images/isom2017img/521.png","standard":"isom2017"},{"code":"522","name":"可通行建筑物","description":"可无障碍通行的有屋顶的建筑结构。 最小面积( 独立使用时 )：0.6 mm×0.6 mm( 符号占地9 m×9 m )。 最小宽度（内侧尺寸）：0.3 mm(符号占地4.5 m)","icon":"images/isom2017img/522.png","standard":"isom2017"},{"code":"523","name":"废墟","description":"毁坏或倒塌的建筑物。应依比例绘制废墟的平面轮廓。小到 无法依比例绘制的废墟可以用实线绘制。 最小面积( 内侧尺寸)：0.8 mm×0.8 mm( 符号占地12 m×12 m )。 100% 50%黄色 绿色 可选黑色 0.75 1.0 x 1.0 0.8 x 0.80.160.25 0.5","icon":"images/isom2017img/523.png","standard":"isom2017"},{"code":"524","name":"高塔","description":"高塔或大型塔架。如果它在森林中，必须高于周围森林可 见。占地面积较大的塔必须使用符号“建筑物（521）”绘制。 符号方向朝北。 符号占地：直径21 m","icon":"images/isom2017img/524.png","standard":"isom2017"},{"code":"525","name":"小塔","description":"突出的小塔，平台或底座。符号的重心是实地精确位置。 符号方向朝北。 符号占地：15 m×15 m","icon":"images/isom2017img/525.png","standard":"isom2017"},{"code":"526","name":"堆石标","description":"突出的堆石标（山顶标志或墓碑）、纪念碑、小纪念碑、界 碑、边界石标或测绘三角点石标。 最小高度：0.5 m。 符号占地：直径12 m","icon":"images/isom2017img/526.png","standard":"isom2017"},{"code":"527","name":"饲料架","description":"单独或附着在树上的饲料架。 符号的重心是实地精确位置。 符号方向朝北。 符号占地：13.5 m×13.5 m","icon":"images/isom2017img/527.png","standard":"isom2017"},{"code":"528","name":"突出的线状地物","description":"突出的人工线状地物。例如：较低的管道（输送天然气、 水、石油、热力等）或清晰可见的雪橇/旱橇轨。必须在地图上 给出符号的定义。 最小长度：1.5 mm(符号占地22.5 m）","icon":"images/isom2017img/528.png","standard":"isom2017"},{"code":"529","name":"突出的难以翻越的线状地物","description":"难以翻越的突出人工线状地物。例如：高管道（输送天然 气、水、石油、热力等）或雪橇/旱橇轨。必须在地图上给出符 号的定义。 最小长度：2 mm(符号占地30 m)","icon":"images/isom2017img/529.png","standard":"isom2017"},{"code":"530","name":"突出的特殊人工地物-〇","description":"符号的重心是实地精确位置。 必须在地图上给出符号定义。 符号占地：直径12 m","icon":"images/isom2017img/530.png","standard":"isom2017"},{"code":"531","name":"突出的特殊人工地物-×","description":"符号的重心是实地精确位置。 符号方向朝北。 必须在地图上给出符号定义。 符号占地：12 m×12 m","icon":"images/isom2017img/531.png","standard":"isom2017"},{"code":"532","name":"阶梯","description":"穿越或翻越特征物的明显阶梯，有助于爬上非常陡峭的山坡 或翻越难以翻越的特征物。通过石崖通道或难以翻越的特征物之 间的阶梯可以不绘制边线。 容易通行的阶梯或不明显的阶梯必须绘制为小径。阶梯的阶 线必须使用综合的方式绘制。 最小长度：3条(阶线)。 最小宽度：0.4 mm(内侧尺寸)。 0.80.8 0.10.1 3.6 技术符号3.6 技术符号","icon":"images/isom2017img/532.png","standard":"isom2017"},{"code":"601","name":"磁北线","description":"磁北线是地图上指向磁北，与纸张的侧边平行的线。它们 在地图上的间距必须为20 mm，在1:15 000比例尺的地面上代表 。如果地图放大到1:10 000，则地图上磁北线的间距为 。 当磁北线遮挡小细节时必须剪断它们以提高地图的易读性。 在水系很少的地区，可以使用蓝线","icon":"images/isom2017img/601.png","standard":"isom2017"},{"code":"602","name":"十字套准线","description":"地图的四角可放置至少三个十字套准线。这些套准线用于在 已经印刷好的地图上打印线路图。此外，它还可以用于检查分色 印刷时是否印准","icon":"images/isom2017img/602.png","standard":"isom2017"},{"code":"603","name":"高程注记","description":"高程注记用于粗略估计高程。以米（m）为单位绘制附近的 高程。水面高程不需要绘制注记点。高程注记放置在不遮挡其他 符号的位置。 字体：无衬线字体，高1.5 mm,非粗体,非斜体。 353.7 线路设计符号3.7 线路设计符号 线路设计符号的尺寸以毫米（mm）为单位，印刷比例为1:15 000。对于比例尺较大的 地图，符号必须按比例放大（1:10 000放大至150%，1:5 000放大至300%）。 所有线路设计符号必须打印在地图其他内容之上。它们不得掩盖黑色、棕色和100%蓝 色的地图细节。 本节的插图尺寸为1:15本节的插图尺寸为1:15 000比例尺地图的尺寸。000比例尺地图的尺寸","icon":"images/isom2017img/603.png","standard":"isom2017"},{"code":"701","name":"起点","description":"定向运动比赛开始的地方。三角形的中心是定向运动线路起 点的精确位置。起点必须在地图清晰可辨认的位置。三角形其中 一个顶点指向第一个检查点的方向","icon":"images/isom2017img/701.png","standard":"isom2017"},{"code":"702","name":"取图点","description":"如果有前往起点的必经线路，则使用此符号标记取图点","icon":"images/isom2017img/702.png","standard":"isom2017"},{"code":"703","name":"检查点","description":"对于点状特征物，检查点的中心必须为点状特征物符号的中 心。 对于线状和面状特征物，检查点的中心表示点标旗的精确位 置。检查点必须放置在地图清晰可见的位置。 遮挡的重要细节处的圆圈部分应剪断。 符号占地：75m。 704 检查点序号 (T)704 检查点序号 (T) 检查点序号靠近检查点圆圈放置，不得遮挡地图的重要细 节。这些数字朝北。 字体：Arial，4.0mm，非粗体，非斜体","icon":"images/isom2017img/703.png","standard":"isom2017"},{"code":"705","name":"线路连线","description":"如果需按顺序到访检查点，则用直线从起点到第一个检查 点，然后依次连接剩下的检查点来显示顺序。遮挡重要细节时应 剪断此部分的连线。连线需要指向经过的强制通过点。为了增加 靠近检查点圆圈底层细节的易读性，连线与圆圈之间应留有间 隙","icon":"images/isom2017img/705.png","standard":"isom2017"},{"code":"706","name":"终点","description":"线路结束处","icon":"images/isom2017img/706.png","standard":"isom2017"},{"code":"707","name":"必经线路","description":"有标记的一段线路，必经线路是线路的一部分。必须沿必经 线路行进。 最小长度：2段线划（4.5 mm–符号占地：67.5 m）","icon":"images/isom2017img/707.png","standard":"isom2017"},{"code":"708","name":"禁过线","description":"禁止穿越的界线。 禁止穿越本符号。 最小长度：1 mm（符号占地：15 m）","icon":"images/isom2017img/708.png","standard":"isom2017"},{"code":"709","name":"禁区","description":"禁入的区域。如果没有自然边界，则可以如下绘制边线： • 实线表示禁区边界在实地有连续的标志物（警戒带等）。 • 虚线表示禁区边界在实地有不连续的标志物。 • 无边线表示禁区边界在实地没有标志物。 禁止进入禁区。 最小面积：2 mm×2 mm(符号占地30 m×30 m)","icon":"images/isom2017img/709.png","standard":"isom2017"},{"code":"710","name":"通过点","description":"例如穿越或翻越墙、围栏、公路、铁路、隧道、禁区、禁过 线的通过点，本符号在地图上用绘有两条向外弯曲的线绘制。这 些线必须依比例绘制","icon":"images/isom2017img/710.png","standard":"isom2017"},{"code":"711","name":"禁行路线","description":"禁行的路线。运动员可以快速横穿禁行路线，但不得沿该路 线行进。禁行路线不得独立使用时。 最小长度：2个符号（6 mm–占地90 m）","icon":"images/isom2017img/711.png","standard":"isom2017"},{"code":"712","name":"急救点","description":"提供医疗急救服务的位置","icon":"images/isom2017img/712.png","standard":"isom2017"},{"code":"713","name":"补给点","description":"与检查点不在同一位置的补给点。 3.00.6 3.04.0-6.0 3.5 3.5 2.10.4 373.8 符号的精确定义3.8 符号的精确定义 注意：尺寸以mm为单位。注意：尺寸以mm为单位。 为清晰起见，本节所有插图均放大了10倍。当重心不明显时，用(×)标记重心。 0.140.400.18 (0.25) 39勘误表 (对比原文件的修改记录): 修改日期 编号 符号 详情 20.01.2020 415明显的种植界线 线宽修订: 0.14 --> 。 20.01.2020 214裸岩地 颜色修订：灰或25%黑→30%黑。 20.01.2020 521建筑物 颜色颜色：65%黑→60%黑。 -713线路设计符号 颜色的精确定义：上层紫色，下层紫色。 23.01.2022 108小冲沟 最少点数: 3 --> 2。 23.01.2022 416明显的植被界线颜色修订:100%绿色和50%黑色 -->深绿色(100 0 80 30)。 23.01.2 const ISSPR_DATA = [{"code":"101","name":"首曲线（基本等高线）","description":"首曲线是地面上高程相等的各相邻点所连成的闭合曲线。 标准等高距为2m或2.5m。为了突出三维效果，首曲线必须绘制为 为穿过所有符号的连续的线，也包括“建筑物（521）”和“可 通行的建筑物（522）”。 示坡线绘制在首曲线较低的一侧用来指示下坡方向，使用时 将示坡线放置在山凹处。 为有更好的易读性如果首曲线遮挡以下符号时必须剪开， 例如：“小土垄（105）”、“小凹地（111）”、“坑或洞 （112）”、“突出的特殊地貌（115）”、“阶梯（532）”。 当首曲线遮挡“圆形土堆（109）”或“狭长土堆（110）”时应 调整首曲线的位置，如条件不允许调整位置则剪开首曲线，以避 免相互接触。 绝对高程并不那么重要，但相邻特征之间的相对高度应在 地图上尽可能精确地绘制出来。为更加突出的绘制地貌特征，允 许稍微改变首曲线位置，但变化不应超过等高距的25%，并且必 须注意相邻地物。首曲线最小弯曲外端处顶点线中心到主线所处 线中心的距离为0.4 mm。 0.210.75min = 最小尺寸","icon":"images/issprom2019-2/101.png","standard":"issprom2019"},{"code":"102","name":"计曲线（加粗等高线）","description":"为快速判读高度差和地貌的整体起伏，每隔四条首曲线必 须绘制一条较粗的计曲线。在细节较多的区域计曲线可以用“首 曲线（101）”代替。 可以绘制等高线注记以帮助运动员估算较大的高度差。等 高线注记的顶部方向必须朝向等高线的较高侧。在计曲线上绘制 等高线注记时不能遮挡其他细节。 字体：Arial，高1.52 mm，字号6 pt,非粗体，非斜体，无 衬线","icon":"images/issprom2019-2/102.png","standard":"issprom2019"},{"code":"103","name":"间曲线（半距等高线）","description":"间曲线又名半距等高线。间曲线用于绘制更详尽的地貌信 息。间曲线仅在首曲线无法绘制的情况下使用。在两条相邻等高 线之间仅可绘制一条间曲线","icon":"images/issprom2019-2/103.png","standard":"issprom2019"},{"code":"104","name":"土崖","description":"陡峭的土崖（土坎）是指可与周围环境明显区分出来的地 面高度骤变的地貌，例如砾石坑或沙坑，公路或铁路的路堑或路 堤。齿线的长度表示整个土崖坡面的水平延伸范围，如果两个土 崖紧邻，则可以省略齿线。禁止翻越的土崖必须使用“禁止翻越 的石崖（201）”绘制。高土崖可选用线粗0.37 mm的主线","icon":"images/issprom2019-2/104.png","standard":"issprom2019"},{"code":"105","name":"小土垄","description":"小而明显的土垄，通常是人造的。较宽的土垄应使用“首 曲线（101）”、“间曲线（103）”或“土崖（104）”绘制。 最小高度：0.5 m。 最小长度：1.4 mm（符号占地5.6 m）","icon":"images/issprom2019-2/105.png","standard":"issprom2019"},{"code":"107","name":"冲沟或壕沟","description":"用单线绘制因太小而不能用“土崖（104）”、“首曲线 （101）”、“计曲线（102）”或“间曲线（103）”绘制的冲 沟或壕沟。符号的两端是尖的。应剪开此符号周围的等高线以提 高易读性。 最小深度：1 m。 最小长度：2.0 mm（符号占地8 m）","icon":"images/issprom2019-2/107.png","standard":"issprom2019"},{"code":"108","name":"小冲沟","description":"小的冲沟或小壕沟。应剪开此符号周围的等高线以提高易 读性。 最小深度：0.5 m。 最小长度（独立使用时）：2个点（1 mm–符号占地4 m）","icon":"images/issprom2019-2/108.png","standard":"issprom2019"},{"code":"109","name":"圆形圆形 土堆","description":"无法用“首曲线（101）”、“计曲线（102）”或“间曲 线（103）”依 ","icon":"images/issprom2019-2/203.png","standard":"issprom2019"},{"code":"204","name":"石块","description":"小而明显的石块。 地图上绘制的所有石块都必须能快速的在实地辨识。 符号占地：直径2.4 m","icon":"images/issprom2019-2/204.png","standard":"issprom2019"},{"code":"205","name":"大石块","description":"特别大而明显的石块。 符号占地：直径3.6 m","icon":"images/issprom2019-2/205.png","standard":"issprom2019"},{"code":"206","name":"巨石或岩柱","description":"必须按平面轮廓形状绘制超大的石块，岩柱或巨大的岩 壁。地图中的形状和尺寸可能和插图不同。 地图上巨石间或与其他无法通行的特征符号之间的距离必 须超过0.15 mm。 最小宽度：0.3 mm。 最小面积：0.75 mm²（符号占地12 m²）","icon":"images/issprom2019-2/206.png","standard":"issprom2019"},{"code":"207","name":"石群","description":"众多堆积在一起无法单独绘制的石头。石群中的石头应高 于0.5m。石群必须为一组易于识别的石块群。为了能够显示相邻 石群（最大间距为8m）之间的区别，对于大小存在显著差异的石 群之间，允许将该符号放大20％（边长1.44mm）来绘制。符号方 向朝北。 符号占地：4.8 m×4.0 m。 1.10.251.251.1 (1.44)最大. 2.01.2","icon":"images/issprom2019-2/207.png","standard":"issprom2019"},{"code":"208","name":"石块地","description":"随机分布着众多无法单独绘制的石块的区域。三角形的密 度越大越降低通行性。符号最小尺寸必须绘制两个三角形。为了 能够显示在石块地内高度差异明显的区域，可以将部分三角形放 大至120％","icon":"images/issprom2019-2/208.png","standard":"issprom2019"},{"code":"210","name":"碎石地","description":"降低了通行性的布满碎石或小石块的区域。 点的密度必须根据碎石的数量绘制，且点的位置应随机分 布，但不干扰重要地貌特征或地物的绘制。符号最小尺寸必须绘 制三个点。为避免与“明显的植被界线（416）”符号混淆，不 得排列成单点线的式样。 密度：最少3个点","icon":"images/issprom2019-2/210.png","standard":"issprom2019"},{"code":"213","name":"空旷的沙地","description":"没有植被的通行性降低的沙质地面或软砾石区域。如果沙 质区域是空旷的并且具有良好的通行性，则用“空旷地（401 ）”、“稀树空旷地（402）”或“铺装地面（501）”绘制。黑 点不得干扰其他黑色符号。 最小宽度：0.3 mm。 最小面积：1 mm²（符号占地16 m²）","icon":"images/issprom2019-2/213.png","standard":"issprom2019"},{"code":"214","name":"裸岩地","description":"没有泥土或植被覆盖的可通行的岩面区域。 覆有草、苔藓或其他低矮植被的岩石区域必须根据其通视 性和通行性用（401/402/403/404）来绘制。 最小宽度：0.25 mm。 最小面积：1 mm²（符号占地16 m²）。 0.5ø0.18 45º","icon":"images/issprom2019-2/214.png","standard":"issprom2019"},{"code":"301","name":"禁止穿越的水域","description":"可能对运动员产生危险的深水区域，如湖泊、池塘、河流 或喷泉。蓝色填充面和黑色轮廓线表示禁止穿越该符号。 最小宽度：0.3 mm。 最小面积（内部）：0.5 mm²（符号占地8m²） 色。0.18最小宽度: 0.3 100% (70%)","icon":"images/issprom2019-2/301.png","standard":"issprom2019"},{"code":"302","name":"可穿越的浅水域","description":"可穿越的浅水区域，如可以穿越的池塘、河流或喷泉。水 深度应小于0.5m并且可以穿越。如果水体禁止穿越，则必须使用 禁止穿越的水域（301）绘制。如果边界没有与其他线状符号接 触，则轮廓必须用蓝线绘制。 最小宽度：0.3 mm。 最小面积（内部）：0.5 mm²（符号占地8m²）","icon":"images/issprom2019-2/302.png","standard":"issprom2019"},{"code":"303","name":"水坑","description":"积满水的坑或太小而无法依比例绘制的水域。符号的重心 是实地精确位置，符号方向朝北。 符号占地：4.4 m×5.0 m","icon":"images/issprom2019-2/303.png","standard":"issprom2019"},{"code":"305","name":"可穿越的小水道","description":"宽度小于2m的可穿越穿越的水道。 最小长度：1 mm（符号占地4 m）","icon":"images/issprom2019-2/305.png","standard":"issprom2019"},{"code":"306","name":"次要/季节性水渠","description":"可能季节性有水的天然或人造的次要水渠。 最小长度（独立使用时）：两段线划（4.11 mm–符号占地 ）","icon":"images/issprom2019-2/306.png","standard":"issprom2019"},{"code":"307","name":"禁止穿越的沼泽","description":"禁止穿越或对运动员可能存在危险的沼泽。 该符号禁止穿越。至少绘制两条清晰可见的蓝色线划。符 号方向朝北。 最小宽度：两行蓝线","icon":"images/issprom2019-2/307.png","standard":"issprom2019"},{"code":"308","name":"可穿越的可穿越的 沼泽","description":"可穿越的沼泽，通常具有明显的边缘。必须叠加其他符号 以显示通行性和通视性。至少绘制两条清晰可见的蓝色线划。符 号方向朝北。 最小宽度：两行蓝线","icon":"images/issprom2019-2/308.png","standard":"issprom2019"},{"code":"309","name":"狭窄的沼泽","description":"因太狭窄而不能用“可穿越的沼泽（308）”符号绘制的沼 泽或涓涓细流。 最小长度（ 独立使用时 ）:两个点( 最小长度1 mm-符号占地4m )","icon":"images/issprom2019-2/309.png","standard":"issprom2019"},{"code":"310","name":"不明显的沼泽","description":"可以穿越的不明显的季节性沼泽或从沼泽到坚实地面的过 渡区域。边界通常不明显，植被与周围区域相似。该符号必须叠 加其他符号以显示通行性和通视性，至少绘制三条清晰可见的蓝 色线划。符号方向朝北","icon":"images/issprom2019-2/310.png","standard":"issprom2019"},{"code":"311","name":"井或小喷泉","description":"直径至少为1 m的井或小喷泉。 最小深度：0.5 m。 符号占地：3.6 m×3.6 m","icon":"images/issprom2019-2/311.png","standard":"issprom2019"},{"code":"312","name":"泉源","description":"伴有明显泉涌的水源。符号的重心是实地精确位置。 符号方向朝向下游。 符号占地：4.8 m×2.4 m","icon":"images/issprom2019-2/312.png","standard":"issprom2019"},{"code":"313","name":"突出的特殊水体","description":"明显或突出的特殊小水体。该符号方向朝北。必须在地图上给出符号的定义。","icon":"images/issprom2019-2/313.png","standard":"issprom2019"},{"code":"401","name":"空旷地","description":"通行性好的耕地、草坪、田野、牧场、草原、树皮覆盖地 等没有树木的区域。 最小宽度：0.3 mm。 最小面积：0.5 mm²（符号占地8 m²）","icon":"images/issprom2019-2/401.png","standard":"issprom2019"},{"code":"402","name":"稀树空旷地","description":"空旷地上零散分布着树木或灌木丛等地面覆盖物的通行性 好的区域。符号的点可以是白色的（零散分布的乔木）或绿色的 （零散分布的灌木/灌木丛）。可以叠加符号“突出的大树（417 ）”和“突出的灌木丛或小树（418）”绘制特别突出的树。该 符号方向朝北。 最小宽度：2.2 mm。 最小面积：6.25 mm²（符号占地100m²）。 较小的区域必须被省、夸大或使用符号空旷地(401）绘制","icon":"images/issprom2019-2/402.png","standard":"issprom2019"},{"code":"403","name":"凌乱空旷地","description":"荒野、高沼地、砍伐地、树木新植区（树高低于1 m）或其 他具有凌乱地表植被如帚石楠或高草覆盖的空旷地。此符号可与 下列植被符号叠加：“通视性好的慢跑矮植被(407)”、 “通视性好的慢行矮植被（409）”，以表示通行性降低。 最小面积：1 mm²（符号占地16 m²）","icon":"images/issprom2019-2/403.png","standard":"issprom2019"},{"code":"404","name":"凌乱稀树空旷地","description":"凌乱空旷地上零散分布着树木或灌木的区域。符号的点可 以是白色（零散分布的乔木）或绿色（零散分布的灌木/灌木 丛）。可以叠加符号“突出的大树（417）”和“突出的灌木或 小树（418）”绘制特别突出的树。只有带白点的符号可以与以 下植被符号叠加以表示通行性降低：“通视性好的慢跑矮植被 （407）”、“通视性好的慢行矮植被（409）”。 最小宽度：2.5 mm。 最小面积：6.25 mm²（符号占地100m²）。 较小的区域必须省略、夸大或使用符号“凌乱空旷地（403 ）”或“树林（405）”绘制","icon":"images/issprom2019-2/404.png","standard":"issprom2019"},{"code":"405","name":"好跑树林","description":"针对特定地形的典型开阔树林。如果没有可以轻松通行的 树林区域，则地图上不应出现白色。 最小宽度（剪孔时）：0.3 mm。 最小面积：最小面积1 mm²（符号占地16m²）；“慢行植被 （408）”和“空旷地（401）”符号中最小面积为0.5mm²（符号 占地8m²）；“不能穿越植被（410）”中最小面积为0.3mm²（符 号占地5m²）","icon":"images/issprom2019-2/405.png","standard":"issprom2019"},{"code":"406","name":"慢跑植被","description":"植被茂密（通视性差）的区域，通行性降低至正常速度的 60%—80%。在某方向上具有更好通行性时，使用规则的白色条纹 表示具有更好通行性的方向。至少绘制两条清晰可见的白色条 纹。 最小宽度：0.4 mm。 最小面积：1 mm²（符号占地16 m²）","icon":"images/issprom2019-2/406.png","standard":"issprom2019"},{"code":"407","name":"通视性好的慢跑矮植被","description":"通视性好但通行性降低至慢跑的下层矮植被，植被类型通 常为矮灌木（荆棘、帚石楠、矮灌木丛、修剪后的树枝等）。通 行速度降低至正常奔跑速度的60%—80％。此符号禁止与“慢跑 植被（406）”或“慢行植被（408）”叠加使用。 最小宽度：两行绿线","icon":"images/issprom2019-2/407.png","standard":"issprom2019"},{"code":"408","name":"慢行植被","description":"有茂密的树木或灌木丛（通视性好）的区域，通行速度减 少至正常速度的20-60％。在某方向上具有更好通行性时，使用 白色或30％绿色的规则条纹以表示更好通行性的方向。至少绘制 两条清晰可见的白色或30%绿色条纹。 最小宽度：0.4 mm。 最小面积：0.5 mm²（符号占地8m²）","icon":"images/issprom2019-2/408.png","standard":"issprom2019"},{"code":"409","name":"通视性好的慢行矮植被","description":"通视性好但通行性降低至慢行的下层矮植被，植被类型通 常为矮灌木（荆棘，帚石楠，矮灌木丛，修剪后的树枝等下层矮 植被）。通行速度降低至正常奔跑速度的20%—60％。此符号禁 止与“慢跑植被（406）”或“慢行植被（408）”叠加使用。 最小宽度：2行绿线","icon":"images/issprom2019-2/409.png","standard":"issprom2019"},{"code":"410","name":"难行植被","description":"几乎无法通行的茂密植被（树木或灌木丛）的区域。通行 速度几乎为0。 在某方向上具有更好通行性时，绘制白色/30%绿色/60%绿 色的规则条纹以表示更好的通行方向。至少绘制两条清晰可见的 条纹。 最小面积：0.3 mm2（符号占地5 m2）。 最小宽度：0.25 mm","icon":"images/issprom2019-2/410.png","standard":"issprom2019"},{"code":"411","name":"禁行植被","description":"禁止通行的植被是指禁止穿越或翻越的植被区域（例如树 篱），因为可能存在私有财产或植被本身受损的危险。 最小面积：0.3 mm2（符号占地5 m2）。 最小宽度：0.4 mm","icon":"images/issprom2019-2/411.png","standard":"issprom2019"},{"code":"412","name":"耕地","description":"耕地，常用于种植农作物。通行性可能因种植的农作物的 种类及季节而有所不同。由于通行性具有不确定性，因此在线路 设计时应避免穿越此类区域。该符号与“禁区（709）”叠加使 用以表示禁止进入的耕地。符号方向朝北。 最小宽度：3 mm。 最小面积：9 mm²（符号占地144 m²）","icon":"images/issprom2019-2/412.png","standard":"issprom2019"},{"code":"413","name":"果园","description":"通常以规则的方式种植果树或灌木的区域。规则点形成线 的方向可以显示种植方向。规定至少要绘制四个清晰可见的点。 必须与“空旷地（401）”或“凌乱空旷地（403）”叠加使用。 最小宽度：2 mm。 最小面积：4 mm²（符号占地64 m²）","icon":"images/issprom2019-2/413.png","standard":"issprom2019"},{"code":"414","name":"葡萄园或类似区域","description":"葡萄园或类似植被的种植区，种植着浓密的单行植被，但 在种植方向上好跑。线的方向必须指示种植方向。至少要绘制三 行清晰可见的绿色线划。必须与符号“空旷地（401）”或“凌 乱空旷地（403）”叠加使用。 最小宽度：2 mm。 最小面积：4 mm²（符号占地64 m²）。 0.8","icon":"images/issprom2019-2/414.png","standard":"issprom2019"},{"code":"415","name":"明显的种植界线","description":"耕种植被（符号401、412、413、414）的边界线或未用其 他符号（栅栏、墙、路径等）绘制的耕地之间的边界线。 最小长度：1 mm（符号占地4 m）","icon":"images/issprom2019-2/415.png","standard":"issprom2019"},{"code":"416","name":"明显的植被界线","description":"树林中非常明显的植被分界线或树林边界线。 对不明显的界线仅通过颜色和/或网状符号的变化来表示。 最小长度（独立使用时）：五个点（2.65 mm-符号占地 ）","icon":"images/issprom2019-2/416.png","standard":"issprom2019"},{"code":"417","name":"突出的大树","description":"突出的独立大树（乔木）。 在绿色圆圈下叠加白色底色，以提高其在黄色和绿色符号 中的易读性 (OM )。 符号占地：直径4.8 m（外部尺寸5.6 m）","icon":"images/issprom2019-2/417.png","standard":"issprom2019"},{"code":"418","name":"突出的灌木或树","description":"突出的独立灌木丛或小乔木。 中间的小白点有助于帮助色觉受损的运动员识别符号。 符号占地：直径3.2 m","icon":"images/issprom2019-2/418.png","standard":"issprom2019"},{"code":"419","name":"突出的特殊植被","description":"重要或突出的特殊植被。 白色底色叠加在绿“×”下使用，以提高在黄色和绿色 符号中的易读性（白色底色的线宽0.5 mm，必须长于符号末端 ）。 符号方向朝北。 必须在地图上给出符号的定义。 符号占地：4.8 m×4.8 m（外部尺寸7.1 m×7.1 m）","icon":"images/issprom2019-2/419.png","standard":"issprom2019"},{"code":"501","name":"铺装地面","description":"有沥青、硬砾石、瓷砖、混凝土等坚硬表面的区域。它应 以“铺装地面边线或台阶线（501.1）”作为边线（或轮廓）。 如果铺装地面的差异可用于导航，则可以用符号“铺装地面边线 或台阶线（501.1）”绘制。黑色边线在符合逻辑的地方可以省 略（例如从砾石到草地的不明显/渐变过渡区）。 车道或人行道路的路况必须用不同的棕色绘制。 量大处为50%，黑色","icon":"images/issprom2019-2/501.png","standard":"issprom2019"},{"code":"501.1","name":"铺装地面边线或台阶线","description":"铺装地面边缘线。 如果没有导航作用则省略铺装地面内部的线","icon":"images/issprom2019-2/501_1.png","standard":"issprom2019"},{"code":"501.2","name":"底层的铺装地面边线或阶梯线","description":"该符号仅适用于两层大面积通行结构中，具有导航作 用的底层的铺装地面边线或阶梯线。线路两端的制图间距为","icon":"images/issprom2019-2/501_2.png","standard":"issprom2019"},{"code":"501.3","name":"稀树铺装地面","description":"有分散的树木或灌木丛的铺装地面。 最小宽度：2.2 mm 最小面积：6.25 mm²（符号占地100 m²） 较小的区域须省略、夸大或使用“铺装地面（501）”绘 制","icon":"images/issprom2019-2/501_3.png","standard":"issprom2019"},{"code":"505","name":"无铺装的步道或车道","description":"主要以慢行的方式通过的无铺装的步道或坑洼的车道，没 有平整、坚硬的路面。颜色应与符号“铺装地面（501）”相 同。 交通量较大0.1 30% 0.75ø0.630% (50%) 45º","icon":"images/issprom2019-2/505.png","standard":"issprom2019"},{"code":"506","name":"无铺装的小径或小车道","description":"无铺装的小径或小车道。 最小长度（独立使用时）:两段线划（3.4 mm–符号占地 ）","icon":"images/issprom2019-2/506.png","standard":"issprom2019"},{"code":"507","name":"不明显小径","description":"不明显的小径或林业采伐道。 最小长度：两条双短线划（7.9 mm-符号占地31.6 m）","icon":"images/issprom2019-2/507.png","standard":"issprom2019"},{"code":"508","name":"林中带状空隙","description":"林中带状空隙是指在没有明显路径的树林中的带状空隙（ 通常是在人工林中）或线性地表痕迹。如果沿着它有一条路径， 则必须使用“无铺装的小径或小车道（506）”绘制。 最小长度：两段线划（9.75 mm-符号占地39 m）","icon":"images/issprom2019-2/508.png","standard":"issprom2019"},{"code":"509.1","name":"铁路","description":"具有永久轨道的铁路，上面铺有铁轨，机车、马车或货车 可在其上行驶。如果禁止跨越铁路或禁止沿着铁路奔跑，则铁路 上叠加符号“禁区（520）”。 最小长度（独立使用时）：两段线划（4 mm-符号占地 ）","icon":"images/issprom2019-2/509_1.png","standard":"issprom2019"},{"code":"509.2","name":"有轨电车轨道","description":"有轨电车是沿着某些特定街道行驶的公共交通工具。运动 员可以轻松越过轨道。除非有轨电车轨道提供导航作用，否则不 予绘制","icon":"images/issprom2019-2/509_2.png","standard":"issprom2019"},{"code":"512.1","name":"桥梁或隧道入口","description":"桥梁是跨越并允许在河流、峡谷、道路等地物上通行的结 构。该符号代表的桥梁可以从下方通过。三角形顶点到其他黑色 符号的制图间距为0.15mm。必须特别注意三角形顶点的绘制。 在下方不能通过的简易桥梁应使用符号“禁止翻越的墙” （515）绘制。 最小尺寸：实地复杂的情况下使用一个三角形绘制（应尽 量避免此类情况），独立使用的情况下最少绘制两个三角形","icon":"images/issprom2019-2/512_1.png","standard":"issprom2019"},{"code":"512.2","name":"地下通道或隧道","description":"地下通道或隧道是在地面或建筑物下方通行的通道，尤 其是供行人或车辆通过的通道。该符号的起止位置制图间距为","icon":"images/issprom2019-2/512_2.png","standard":"issprom2019"},{"code":"512.3","name":"两层可通行层面","description":"除两层结构符号的上层颜色绘制为禁止通行的符号外[例 如：禁止穿越的水域（301）和禁区（520）符号等]，运动员均 可在两层通行。条纹图案的角度与所绘制区域的轴线方向夹角约 45°。 可能的符号组合有：空旷的沙地（213）[使用凌乱空旷地 (403)替代条纹区域]，裸岩地（214），禁止穿越的水域（301） ，浅水域（302），空旷地（401），稀树空旷地（402）[使用 空旷地(401)代替条纹区域]，凌乱空旷地（403），凌乱稀树空 旷地（404）[使用凌乱空旷地(403)代替条纹区域]，慢跑植被 （406），慢行植被(408)，难行植被(410),禁行植被（411）， 耕地（412）[使用凌乱空旷地(403)替代条纹区域]，果园(413) 和葡萄园或类似区域（414）[使用空旷地(401)或凌乱空旷地 (403)替代条纹区域]，铺装地面（501），稀树铺装地面(501.3) [使用铺装地面(501)替代条纹区域]，禁区（520），可通行的建 筑物（522），禁区（709）[使用上层100%紫色替代条纹区域]， 临时建筑或隔离区域(714)[使用上层100%紫色替代条纹区域]","icon":"images/issprom2019-2/512_3.png","standard":"issprom2019"},{"code":"513.1","name":"可翻越的墙","description":"可翻越的墙是指由石头、砖、混凝土等搭建的墙体。如果 墙高于1.5 m，则必须使用“禁止翻越的墙（515）”绘制。墙体 较宽时必须用可翻越的墙符号绘制轮廓，并填充相应的地面符 号。尽可能绘制带点的线。（其最小长度为圆点距离两侧端点 。） 最小长度（独立使用时）:1.4 mm（符号占地5.6 m）","icon":"images/issprom2019-2/513_1.png","standard":"issprom2019"},{"code":"513.2","name":"可翻越的挡土墙","description":"仅从一侧可见的可翻越的挡土墙。半点必须指向较低侧。 高度为0.6 m-1.5 m。更低则使用“铺装地面边线或台阶线 （501.1）”绘制。 最小长度（独立使用时）：2.4 mm（符号占地9.6 m）","icon":"images/issprom2019-2/513_2.png","standard":"issprom2019"},{"code":"515","name":"禁止翻越的墙","description":"禁止翻越或禁止穿越的墙或挡土墙，其具有隔离或阻挡的 作用。因其高度可能对运动员构成危险所以禁止翻越。非常宽的 禁止翻越的墙必须使用“建筑物（521）”绘制出其形状。 最小长度：1 mm(符号占地4m)","icon":"images/issprom2019-2/515.png","standard":"issprom2019"},{"code":"516","name":"可翻越的围栏或栏杆","description":"可通过的围栏是靠近或围绕田、院子等地方的障碍物，通 常由柱子、金属丝或木头制成。它用于防止进入、进行控制或标 记边界。栏杆是指由一个或多个横杆组成的障碍物，这些横杆由 间隔较大的直立杆支撑，通常可以钻过。 如果围栏或栏杆有危险或很难翻越，则必须使用“禁止翻 越的围栏或栏杆（518）”绘制。 最小长度（独立使用时）：2.2 mm（符号占地8.8 m）","icon":"images/issprom2019-2/516.png","standard":"issprom2019"},{"code":"518","name":"禁止翻越的围栏或栏杆","description":"因私人财产，或因对运动员有危险或者太高，故禁止穿越 禁止翻越的围栏或栏杆。如果最小长度小于3 mm，则必须用符 号“禁止翻越的墙（515）”绘制。 最小长度（独立使用时）：3 mm（符号占地12 m）","icon":"images/issprom2019-2/518.png","standard":"issprom2019"},{"code":"519","name":"通过点（可选用）","description":"通过点是指围栏、栏杆或墙上很容易被运动员通过的缝 隙、小洞或开口。不应在地图上显示运动员很难通过的小缝隙或 小洞，这些小缝隙或小洞必须在比赛期间予以封闭","icon":"images/issprom2019-2/519.png","standard":"issprom2019"},{"code":"520","name":"禁区","description":"禁止进入的区域，例如私人区域、花坛，铁路区域等。除 特别突出的特征（如铁路、大型建筑物或非常大的树木）外，此 区域内禁止绘制任何其他特征物。道路入口应清晰绘出。 完全包含在建筑物内的禁区必须绘制为建筑物的一部分。 应始终用边界线（线粗至少为0.1 mm）绘制该区域的边界。 最小宽度：0.25 mm（符号占地1 m）。 最小面积：0.25 mm²（符号占地4 m²）","icon":"images/issprom2019-2/520.png","standard":"issprom2019"},{"code":"521","name":"建筑物","description":"建筑物是具有屋顶的相对永久性的结构。在“禁区（520 ）”符号内的建筑物可以仅以简化的方式绘制。完全包含在建筑 物内部的禁区必须绘制为建筑物的一部分。 建筑物与其他禁止穿越的障碍物之间最小间距必须为 。建筑物接触在一起的位置禁止绘制边线。 最小宽度：0.5 mm。 最小面积：0.25 mm²（符号占地4 m²）","icon":"images/issprom2019-2/521.png","standard":"issprom2019"},{"code":"522","name":"可通行的建筑物","description":"可通行建筑物是一种带有屋顶的结构，通常由支柱、撑杆 或墙壁支撑，例如走廊、通道、有顶棚的球场、公共汽车站、加 油站或车库。建筑物中难通行的狭小可通行部分禁止绘制在地图 上，并在比赛期间封闭。 最小宽度：0.5 mm。 最小面积：0.25 mm²（符号占地4 m²）","icon":"images/issprom2019-2/522.png","standard":"issprom2019"},{"code":"522.1","name":"支柱","description":"支柱是由石头、砖或其他材料建成的直立的柱的结构，其 高度相对于截面形状而言是细长的，用作支撑建筑物。实地小于 ×1 m的支柱一般不绘制","icon":"images/issprom2019-2/522_1.png","standard":"issprom2019"},{"code":"524","name":"高塔","description":"高塔或大型塔架。非常大的塔必须以”建筑物（521）“绘 制出轮廓形状。符号方向朝北。 符号占地：直径8.4 m","icon":"images/issprom2019-2/524.png","standard":"issprom2019"},{"code":"525","name":"小塔","description":"明显的小塔、平台或底座。 符号方向朝北。 符号占地：6 m×6 m","icon":"images/issprom2019-2/525.png","standard":"issprom2019"},{"code":"526","name":"堆堆石标、纪念碑、小纪念碑、界碑","description":"突出的堆石标（山顶标志或墓碑）、纪念碑、小纪念碑、 界碑、边界石标或测绘三角点石标。大型纪念碑必须按照轮廓形 状用“建筑物（521）”符号绘制。 符号占地：直径4 m","icon":"images/issprom2019-2/526.png","standard":"issprom2019"},{"code":"527","name":"饲料架","description":"独立或附着在树上的饲料架。符号的重心是实地精确位 置。符号方向朝北。 符号占地：6 m×6 m","icon":"images/issprom2019-2/527.png","standard":"issprom2019"},{"code":"528","name":"突出的线状地物","description":"突出的人工线状地物。例如：较低的管道（输送天然气、 水、石油、热力等）或清晰可见的雪橇/旱橇轨。必须在地图上 给出符号的定义。 最小长度：2.2 mm（符号占地8.8 m）","icon":"images/issprom2019-2/528.png","standard":"issprom2019"},{"code":"529","name":"禁止翻越线的突出线状地物禁止翻越线的突出线状地物","description":"禁止翻越的突出人工线状地物。例如：高管道（输送天然 气、水、石油、热力等）或雪橇/旱橇轨。必须在地图上给出符 号的定义。 最小长度：3 mm（符号占地12 m）","icon":"images/issprom2019-2/529.png","standard":"issprom2019"},{"code":"530","name":"突出的特殊人工地物-〇","description":"重要或突出的人工地物。必须在地图上给出符号的定义。 符号占地：直径4 m","icon":"images/issprom2019-2/530.png","standard":"issprom2019"},{"code":"531","name":"突出的特殊人工地物-X","description":"符号的重心是实地精确位置，符号方向朝北。必须在地图 上给出符号的定义。 符号占地：4.8 m×4.8 m","icon":"images/issprom2019-2/531.png","standard":"issprom2019"},{"code":"532","name":"阶梯","description":"阶梯的阶线必须概括绘制。最小长度：3条阶线（图形）。最小宽度：0.4 mm（内部测量）。","icon":"images/issprom2019-2/532.png","standard":"issprom2019"},{"code":"601","name":"磁北线","description":"磁北线是地图上指向磁北的线。它们的间距必须为30 mm， 实地间距120 m。如果磁北线遮挡了石块、山丘、石崖、溪流交 汇处、路径末端等小细节，则需要剪断。 274.7 4.7 线路设计符号","icon":"images/issprom2019-2/601.png","standard":"issprom2019"},{"code":"701","name":"起点","description":"起点或取图点（如果在起点）用等边三角形绘制，该三角 形其中一个顶点指向第一个检查点的方向。三角形的中心表示起 点的精确位置","icon":"images/issprom2019-2/701.png","standard":"issprom2019"},{"code":"702","name":"取图点","description":"如果有前往起点的必经线路，则使用此符号绘制取图点","icon":"images/issprom2019-2/702.png","standard":"issprom2019"},{"code":"703","name":"检查点","description":"地图上用圆圈（符号占地直径24 m）绘制检查点。圆心表示 检查点的精确位置。检查点圆圈遮挡重要细节时应剪开圆圈的遮 挡部分。 704 704 检查点序号 (T) (T) 检查点序号靠近检查点圆圈放置，但禁止遮挡地图的重要 细节。数字方向朝北。对于建筑物非常密集的地图，可以选择在 检查点序号上添加0.1 mm或0.15 mm宽的白底。 字体：Arial，高4.0 mm，非粗体，非斜体","icon":"images/issprom2019-2/703.png","standard":"issprom2019"},{"code":"705","name":"线路连线","description":"起点、检查点和终点需按顺序到访时通过直线连接在一起 的线。应剪断遮挡重要地图细节部分的连线","icon":"images/issprom2019-2/705.png","standard":"issprom2019"},{"code":"706","name":"终点","description":"地图上用两个同心圆绘制终点","icon":"images/issprom2019-2/706.png","standard":"issprom2019"},{"code":"707","name":"必经线路","description":"地图上用虚线绘制必经线路。 0.354.0ø 6.00.35 线路设计符号的尺寸以（mm)毫米为单位，打印比例为1:4 000。对于较大的地图比例 尺，符号应按比例放大（1:3 000为133%）。它们不应遮盖至少100%的黑色、棕色和蓝色地 图细节。本节中的插图尺寸为1:4 000比例尺地图的尺寸","icon":"images/issprom2019-2/707.png","standard":"issprom2019"},{"code":"708","name":"禁过线","description":"禁止穿越禁过线。 它用于线路设计时临时禁止通过的线","icon":"images/issprom2019-2/708.png","standard":"issprom2019"},{"code":"709","name":"禁区","description":"禁止进入的管制区域。如果没有自然边界，则各类型边界 线的绘制方法如下： • 实线表示禁区的边界在实地有连续的标志物（警戒带等） • 虚线表示禁区的边界在实地有不连续的标志物， • 无边线表示禁区的边界在实地没有标志物。 禁止进入禁区内。 最小宽度：3 mm。 最小面积：9 mm²（符号占地144 m²）","icon":"images/issprom2019-2/709.png","standard":"issprom2019"},{"code":"710.1","name":"通过点","description":"通过点是绘制在地图上穿过墙壁、围栏、道路、铁路、隧 道、禁止通行的区域的部分，两条线向外弯曲。 如果在比赛中使用地下通道或隧道等，可以使用符号通过 点（710.1）或通过区（710.2）进行强调","icon":"images/issprom2019-2/710_1.png","standard":"issprom2019"},{"code":"710.2","name":"通过区","description":"通过区是依轮廓形状以线状符号绘制在地图上穿越或翻越 建筑物、墙壁、围栏、大路、铁路、隧道、禁区的可通过部分。 如果在比赛中使用地下通道或隧道等，可以使用符号“通 过点（710.1）”或“通过区（710.2）”进行强调","icon":"images/issprom2019-2/710_2.png","standard":"issprom2019"},{"code":"714","name":"临时建筑或隔离区域","description":"明显的临时建筑，如观众席和解说员的平台，观众隔离 区，露天餐厅等，必须以轮廓形状进行绘制。 禁止穿越本符号。 最小宽度：0.5 mm。 最小面积：0.25 mm²（符号占地4 m²）。 1.00.350.7 3.0 294.8 4.8 符号的精确定义 注意：尺寸以mm为单位。 为清晰起见，本节所有插图均放大了10倍。当重心不明显时，用（×）标记重心。 31勘误表 (对比原文件的修改记录): 修改日期 编号 符号 详情 -714线路设计符号 修订颜色的精确定义：上层紫色，下层紫色。 17.05.2020 501.3稀树铺装地面修订：“空旷地（401）”更改为使用“铺装地 面（501）”。 修订：30%棕色更改为30%（50%）棕色 。 17.05.2020 101首曲线为更好的地图易读性，被等高线遮挡要剪开等高 线的符号中添加“阶梯（532）”。 02.01.2022 104土崖 修订：与符号的精确定义相对应的尺寸标注。 02.01.2022 108小冲沟 修订最小尺寸：3个点更改为2个点。 02.01.2022 201禁止翻越的石崖修订：符号名称； 修订：与符号的精确定义相对应的尺寸标注。 02.01.2022 202可翻越的石崖 修订：与符号的精确定义相对应的尺寸标注。 02.01.2022 410难行植被修订：符号名称； 修订：最小宽度—0.4 mm-->0.25 mm","icon":"images/issprom2019-2/714.png","standard":"issprom2019"}];

const ALL_DATA = [...ISOM_DATA, ...ISSPR_DATA];

// Build lookup by standard+code
const DATA_BY_STD = {
  isom2017: ISOM_DATA,
  issprom2019: ISSPR_DATA
};

const STD_LABELS = {
  isom2017: 'ISOM 2017-2',
  issprom2019: 'ISSprOM 2019-2'
};

const STD_ICON_DIR = {
  isom2017: 'images/isom2017img',
  issprom2019: 'images/issprom2019-2'
};

// ===== STATE =====
let currentStandard = 'all';
let currentDetailIndex = -1; // index in currentDetailList
let currentDetailList = [];  // the list being browsed in detail

// ===== DOM REFS =====
const $listWrap = document.getElementById('listWrap');
const $emptyState = document.getElementById('emptyState');
const $listPage = document.getElementById('listPage');
const $detailPage = document.getElementById('detailPage');
const $searchInput = document.getElementById('searchInput');
const $tabBar = document.getElementById('tabBar');
const $detailImg = document.getElementById('detailImg');
const $detailCode = document.getElementById('detailCode');
const $detailName = document.getElementById('detailName');
const $descCard = document.getElementById('descCard');
const $navCount = document.getElementById('navCount');
const $prevLabel = document.getElementById('prevLabel');
const $nextLabel = document.getElementById('nextLabel');
const $toast = document.getElementById('toast');

// ===== INIT =====
document.getElementById('countAll').textContent = '(' + ALL_DATA.length + ')';
document.getElementById('countISOM').textContent = '(' + ISOM_DATA.length + ')';
document.getElementById('countISS').textContent = '(' + ISSPR_DATA.length + ')';

// ===== RENDER CARD =====
function renderCard(item) {
  var label = STD_LABELS[item.standard] + ' ' + item.code + ' ' + item.name;
  return '<button type="button" class="card" data-std="' + item.standard + '" data-code="' + item.code + '" aria-label="查看' + escHtml(label) + '">' +
    '<div class="img-col"><div class="img-wrap"><img src="' + item.icon + '" alt="' + escHtml(item.code + ' ' + item.name) + '" loading="lazy"></div></div>' +
    '<div class="text-col">' +
      '<div class="code">' + escHtml(item.code) + '</div>' +
      '<div class="name">' + escHtml(item.name) + '</div>' +
      '<div class="desc">' + escHtml(item.description) + '</div>' +
    '</div>' +
  '</button>';
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== RENDER LIST =====
function renderList(items, groupByStd) {
  if (items.length === 0) {
    $listWrap.innerHTML = '';
    $emptyState.style.display = 'block';
    return;
  }
  $emptyState.style.display = 'none';

  if (!groupByStd) {
    $listWrap.innerHTML = items.map(renderCard).join('');
  } else {
    // Group by standard
    const groups = {};
    for (const item of items) {
      if (!groups[item.standard]) groups[item.standard] = [];
      groups[item.standard].push(item);
    }
    let html = '';
    for (const [std, stdItems] of Object.entries(groups)) {
      html += '<div class="group-header">' + STD_LABELS[std] + ' · ' + stdItems.length + ' 个结果</div>';
      html += stdItems.map(renderCard).join('');
    }
    $listWrap.innerHTML = html;
  }

  // Attach click handlers
  $listWrap.querySelectorAll('.card').forEach(function(card) {
    card.addEventListener('click', function() {
      var std = card.dataset.std;
      var code = card.dataset.code;
      openDetail(std, code);
    });
  });
}

// ===== SHOW STANDARD =====
function showStandard(std) {
  currentStandard = std;
  if (std === 'all') {
    renderList(ALL_DATA, true);
  } else {
    renderList(DATA_BY_STD[std], false);
  }
  // Update tab active state
  $tabBar.querySelectorAll('.tab').forEach(function(t) {
    t.classList.toggle('active', t.dataset.std === std);
  });
  // Clear search
  if ($searchInput.value) {
    $searchInput.value = '';
  }
  // Show list page
  showListPage(true);
}

// ===== SEARCH =====
function searchAll(query) {
  var q = query.toLowerCase().trim();
  if (!q) {
    showStandard(currentStandard);
    return;
  }
  // Switch to "all" tab visual
  $tabBar.querySelectorAll('.tab').forEach(function(t) {
    t.classList.toggle('active', t.dataset.std === 'all');
  });
  currentStandard = 'all';

  var results = { isom2017: [], issprom2019: [] };
  for (var i = 0; i < ALL_DATA.length; i++) {
    var item = ALL_DATA[i];
    var haystack = [
      item.code,
      item.name,
      item.description,
      STD_LABELS[item.standard],
      item.standard
    ].join(' ').toLowerCase();
    if (haystack.includes(q)) {
      results[item.standard].push(item);
    }
  }
  var allResults = results.isom2017.concat(results.issprom2019);
  renderList(allResults, true);
  showListPage(true);
}

// ===== SHOW LIST PAGE =====
function showListPage(skipHashUpdate) {
  $listPage.style.display = 'block';
  $detailPage.classList.remove('show');
  if (!skipHashUpdate && window.location.hash) {
    history.pushState('', document.title, window.location.pathname + window.location.search);
  }
}

// ===== OPEN DETAIL =====
function openDetail(std, code) {
  var list = DATA_BY_STD[std];
  currentDetailIndex = -1;
  for (var i = 0; i < list.length; i++) {
    if (list[i].code === code) {
      currentDetailList = list;
      currentDetailIndex = i;
      break;
    }
  }
  // If not found in the specific standard, search all
  if (currentDetailIndex === -1) {
    currentDetailList = ALL_DATA;
    for (var i = 0; i < ALL_DATA.length; i++) {
      if (ALL_DATA[i].code === code && ALL_DATA[i].standard === std) {
        currentDetailIndex = i;
        break;
      }
    }
  }
  renderDetail();
  $listPage.style.display = 'none';
  $detailPage.classList.add('show');
  window.location.hash = 'detail/' + std + '/' + encodeURIComponent(code);
  window.scrollTo(0, 0);
}

function renderDetail() {
  var item = currentDetailList[currentDetailIndex];
  if (!item) return;

  $detailImg.src = item.icon;
  $detailImg.alt = item.code + ' ' + item.name;
  $detailCode.textContent = item.code;
  $detailName.textContent = item.name;

  // Parse description into paragraphs by sentence breaks
  var desc = item.description || '';
  // Split by Chinese period, exclamation, question mark, or newlines
  var rawParts = desc.split(/(?<=[。！？])/);
  // Further split if a "sentence" is too long (over ~80 chars)
  var parts = [];
  for (var i = 0; i < rawParts.length; i++) {
    var p = rawParts[i].trim();
    if (!p) continue;
    // If very long, try to break at spaces or other punctuation every 2-3 sentences
    parts.push(p);
  }

  // Group into paragraphs (2-3 sentences each)
  var paragraphs = [];
  var buf = '';
  var count = 0;
  for (var i = 0; i < parts.length; i++) {
    if (buf) buf += '';
    buf += parts[i];
    count++;
    if (count >= 3 || i === parts.length - 1) {
      paragraphs.push(buf);
      buf = '';
      count = 0;
    }
  }
  if (buf.trim()) paragraphs.push(buf);

  $descCard.innerHTML = paragraphs.map(function(p) {
    return '<p>' + escHtml(p) + '</p>';
  }).join('');

  // Update navigation
  var total = currentDetailList.length;
  var pos = currentDetailIndex + 1;
  $navCount.textContent = pos + ' / ' + total;

  // Previous
  if (currentDetailIndex > 0) {
    var prev = currentDetailList[currentDetailIndex - 1];
    $prevLabel.textContent = prev.code + ' ' + prev.name;
    document.getElementById('bottomPrev').style.visibility = 'visible';
    document.getElementById('prevBtn').style.visibility = 'visible';
  } else {
    $prevLabel.textContent = '—';
    document.getElementById('bottomPrev').style.visibility = 'hidden';
    document.getElementById('prevBtn').style.visibility = 'hidden';
  }

  // Next
  if (currentDetailIndex < total - 1) {
    var next = currentDetailList[currentDetailIndex + 1];
    $nextLabel.textContent = next.code + ' ' + next.name;
    document.getElementById('bottomNext').style.visibility = 'visible';
    document.getElementById('nextBtn').style.visibility = 'visible';
  } else {
    $nextLabel.textContent = '—';
    document.getElementById('bottomNext').style.visibility = 'hidden';
    document.getElementById('nextBtn').style.visibility = 'hidden';
  }
}

function navigateDetail(direction) {
  var newIndex = currentDetailIndex + direction;
  if (newIndex < 0) {
    newIndex = currentDetailList.length - 1;
  } else if (newIndex >= currentDetailList.length) {
    newIndex = 0;
  }
  currentDetailIndex = newIndex;
  var item = currentDetailList[currentDetailIndex];
  window.location.hash = 'detail/' + item.standard + '/' + encodeURIComponent(item.code);
  renderDetail();
  window.scrollTo(0, 0);
}

// ===== EVENT LISTENERS =====
// Search input
$searchInput.addEventListener('input', function() {
  searchAll(this.value);
});

// Tab clicks
$tabBar.addEventListener('click', function(e) {
  var tab = e.target.closest('.tab');
  if (!tab) return;
  var std = tab.dataset.std;
  if ($searchInput.value) {
    $searchInput.value = '';
  }
  showStandard(std);
});

// Back button
document.getElementById('backBtn').addEventListener('click', function() {
  if (currentStandard === 'all') {
    showStandard('all');
  } else if (currentDetailList.length > 0 && currentDetailIndex >= 0) {
    showStandard(currentDetailList[currentDetailIndex].standard);
  } else {
    showStandard('isom2017');
  }
  showListPage();
});

// Nav arrows in header
document.getElementById('prevBtn').addEventListener('click', function() { navigateDetail(-1); });
document.getElementById('nextBtn').addEventListener('click', function() { navigateDetail(1); });

// Bottom nav buttons
document.getElementById('bottomPrev').addEventListener('click', function() { navigateDetail(-1); });
document.getElementById('bottomNext').addEventListener('click', function() { navigateDetail(1); });

// Keyboard navigation
document.addEventListener('keydown', function(e) {
  if ($detailPage.classList.contains('show')) {
    if (e.key === 'ArrowLeft') { e.preventDefault(); navigateDetail(-1); }
    if (e.key === 'ArrowRight') { e.preventDefault(); navigateDetail(1); }
    if (e.key === 'Escape') { e.preventDefault(); showListPage(); showStandard(currentStandard === 'all' ? 'all' : (currentDetailList[currentDetailIndex] ? currentDetailList[currentDetailIndex].standard : 'isom2017')); }
  }
  // Ctrl+K / Cmd+K to focus search
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    showListPage();
    $searchInput.focus();
    $searchInput.select();
  }
});

// ===== HANDLE BACK/FORWARD BUTTON =====
function handleRoute() {
  var hash = window.location.hash;
  if (!hash || hash === '#') {
    showStandard(currentStandard);
    return;
  }
  var m = hash.match(/^#detail\/([a-z0-9]+)\/(.+)$/i);
  if (m) {
    var std = m[1];
    var code = decodeURIComponent(m[2]);
    var list = DATA_BY_STD[std] || ALL_DATA;
    for (var i = 0; i < list.length; i++) {
      if (list[i].code === code) {
        currentDetailList = list;
        currentDetailIndex = i;
        renderDetail();
        $listPage.style.display = 'none';
        $detailPage.classList.add('show');
        window.scrollTo(0, 0);
        return;
      }
    }
  }
  showStandard('all');
}

// ===== INITIAL RENDER =====
showStandard('all');
handleRoute();

window.addEventListener('hashchange', handleRoute);

// ===== TOAST =====
var toastTimer;
function showToast(msg) {
  $toast.textContent = msg;
  $toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() {
    $toast.classList.remove('show');
  }, 2000);
}
